<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#14161c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="割引電卓">
<title>割引電卓 | Juku-Cho</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="64x64" href="assets/favicon-64.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" href="assets/favicon.ico" sizes="any">
<style>
  @font-face{font-family:'BIZ UDPGothic';font-style:normal;font-weight:400;font-display:swap;src:url('assets/BIZUDPGothic-Regular.woff2') format('woff2');}
  @font-face{font-family:'BIZ UDPGothic';font-style:normal;font-weight:700;font-display:swap;src:url('assets/BIZUDPGothic-Bold.woff2') format('woff2');}
</style>
<style>
  :root{
    --ink:#14161c;--ink-2:#1e1c22;--panel:#20232c;--panel-2:#2a2e3a;
    --line:rgba(255,109,92,.16);
    --accent:#ff6d5c;--accent-soft:#ff8776;--on-ink:#2a0c08;
    --text:#f0f3f9;--muted:#8c96a6;--save:#ffb85c;
    --key:#272b36;--key-press:#323849;--danger:#f08a8a;

    /* responsive scale tokens */
    --pad-y:16px;      /* keypad button height */
    --key-fs:22px;     /* keypad font size */
    --final-fs:34px;   /* 割引後の価格 */
    --price-fs:30px;   /* 元の価格 */
    --gap:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  html,body{height:100%}
  body{
    font-family:"BIZ UDPGothic",system-ui,sans-serif;
    background:radial-gradient(120% 60% at 50% -10%, #24222b 0%, var(--ink) 55%) fixed;
    color:var(--text);display:flex;justify-content:center;min-height:100dvh;overflow-x:hidden;
  }
  .app{width:100%;max-width:430px;display:flex;flex-direction:column;
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));gap:var(--gap);position:relative}

  /* ===== header ===== */
  header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:4px 2px 0}
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .brand-icon{width:34px;height:34px;flex:0 0 auto;border-radius:9px;display:block;
    box-shadow:0 5px 14px -6px rgba(255,109,92,.7)}
  .brand h1{font-size:21px;font-weight:700;letter-spacing:.02em;line-height:1.1;white-space:nowrap}
  .brand .dot{color:var(--accent)}
  .tax{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px;font-size:11px;font-weight:700;flex:0 0 auto}
  .tax button{border:0;background:transparent;color:var(--muted);padding:6px 10px;border-radius:999px;cursor:pointer;font-family:inherit;font-weight:700;white-space:nowrap}
  .tax button.on{background:var(--accent);color:var(--on-ink)}

  .tabs{display:flex;gap:6px}
  .tabs button{flex:1;border:1px solid var(--line);background:var(--panel);color:var(--muted);
    padding:9px;border-radius:12px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;transition:.15s}
  .tabs button.on{background:var(--panel-2);color:var(--accent-soft);border-color:rgba(255,109,92,.4)}

  .display{background:linear-gradient(180deg,var(--panel),var(--ink-2));border:1px solid var(--line);border-radius:20px;padding:16px 18px;position:relative;overflow:hidden}
  .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:8px}
  .label{font-size:11px;color:var(--muted);font-weight:400;letter-spacing:.04em}
  .price-in{font-size:var(--price-fs);font-weight:700;letter-spacing:.01em;font-variant-numeric:tabular-nums}
  .price-in.empty{color:var(--muted)}
  .yen{color:var(--accent);font-weight:700;margin-right:2px}
  .divider{height:1px;background:var(--line);margin:13px 0}
  .result{display:flex;align-items:center;gap:14px}
  .tag{position:relative;flex:0 0 auto;background:var(--accent);color:var(--on-ink);border-radius:10px;
    padding:9px 13px 9px 17px;font-weight:700;font-size:18px;line-height:1;box-shadow:0 6px 18px -6px rgba(255,109,92,.55)}
  .tag::before{content:"";position:absolute;left:7px;top:50%;transform:translateY(-50%);width:7px;height:7px;border-radius:50%;background:var(--ink-2)}
  .tag small{display:block;font-size:9px;font-weight:700;letter-spacing:.1em;opacity:.7;margin-bottom:2px}
  .result .out{flex:1;min-width:0}
  .final{font-size:var(--final-fs);font-weight:700;font-variant-numeric:tabular-nums;line-height:1.05;letter-spacing:.005em}
  .save{font-size:13px;color:var(--save);font-weight:700;font-variant-numeric:tabular-nums;margin-top:3px}
  .save .pct{color:var(--muted);font-weight:400}

  .actions{display:flex;gap:7px;margin-top:11px}
  .actions button{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
    border:1px solid var(--line);background:var(--panel);color:var(--text);
    padding:11px;border-radius:13px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;transition:.12s}
  .actions button:active{transform:scale(.97)}
  .actions .primary{background:linear-gradient(180deg,var(--accent-soft),var(--accent));color:var(--on-ink);border-color:transparent}
  .actions svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .badge{display:inline-flex;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--accent);color:var(--on-ink);font-size:11px;font-weight:700;align-items:center;justify-content:center}

  .chips{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-top:12px}
  .chips button{border:1px solid var(--line);background:var(--panel);color:var(--text);padding:11px 0;border-radius:12px;
    font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:.12s;font-variant-numeric:tabular-nums}
  .chips button:active{transform:scale(.94)}
  .chips button.on{background:linear-gradient(180deg,var(--accent-soft),var(--accent));color:var(--on-ink);border-color:transparent}
  .chips button.custom{color:var(--accent-soft);font-size:11px;line-height:1.15}
  .chips button.custom.on{color:var(--on-ink)}

  .pad{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
  .pad button{background:var(--key);border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:var(--key-fs);font-weight:700;
    padding:var(--pad-y) 0;border-radius:15px;cursor:pointer;transition:.08s;font-variant-numeric:tabular-nums}
  .pad button:active{background:var(--key-press);transform:translateY(1px)}
  .pad .fn{color:var(--accent-soft);font-size:calc(var(--key-fs) - 4px)}
  .pad .clr{color:var(--muted);font-weight:700}
  .hint{text-align:center;font-size:11px;color:var(--muted);padding:2px 0 4px}

  .rev{display:none;flex-direction:column;gap:10px}
  .rev.on{display:flex}
  .field{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:11px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:10px}
  .field.active{border-color:rgba(255,109,92,.5)}
  .field .v{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
  .field .v.empty{color:var(--muted)}
  .rev-out{text-align:center;background:linear-gradient(180deg,var(--panel),var(--ink-2));border:1px solid var(--line);border-radius:18px;padding:16px}
  .rev-out .big{font-size:42px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
  .rev-out .sub{font-size:12px;color:var(--muted);margin-top:2px}

  .overlay{position:fixed;inset:0;background:rgba(6,7,11,.62);backdrop-filter:blur(3px);
    display:none;align-items:flex-end;justify-content:center;z-index:50}
  .overlay.on{display:flex}
  .sheet{width:100%;max-width:430px;background:var(--ink-2);border:1px solid var(--line);
    border-radius:22px 22px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom));
    max-height:80dvh;display:flex;flex-direction:column;animation:up .22s ease}
  @keyframes up{from{transform:translateY(30px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .sheet-head h2{font-size:17px;font-weight:700}
  .sheet-head .x{background:var(--panel);border:1px solid var(--line);color:var(--muted);width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;font-family:inherit}

  .cust-display{text-align:center;font-size:46px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;margin:6px 0 16px}
  .cust-display .u{font-size:24px;color:var(--muted)}
  .cust-set{width:100%;margin-top:10px;background:linear-gradient(180deg,var(--accent-soft),var(--accent));color:var(--on-ink);
    border:0;border-radius:15px;padding:15px;font-family:inherit;font-weight:700;font-size:16px;cursor:pointer}

  .hist-list{overflow-y:auto;display:flex;flex-direction:column;gap:8px}
  .hist-empty{text-align:center;color:var(--muted);font-size:13px;padding:34px 0}
  .hist-item{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:11px 13px;cursor:pointer;transition:.12s}
  .hist-item:active{background:var(--panel-2)}
  .hist-tag{flex:0 0 auto;background:var(--accent);color:var(--on-ink);font-weight:700;font-size:13px;border-radius:8px;padding:5px 8px;text-align:center;font-variant-numeric:tabular-nums}
  .hist-mid{flex:1;min-width:0}
  .hist-mid .pf{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
  .hist-mid .pf s{color:var(--muted);font-weight:400;margin-right:7px;text-decoration-color:var(--muted)}
  .hist-mid .meta{font-size:10px;color:var(--muted);margin-top:2px}
  .hist-del{flex:0 0 auto;background:transparent;border:0;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 6px;font-family:inherit}
  .hist-clear{width:100%;margin-top:12px;background:var(--panel);border:1px solid rgba(240,138,138,.3);color:var(--danger);
    border-radius:13px;padding:12px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);
    background:var(--accent);color:var(--on-ink);font-weight:700;font-size:13px;padding:10px 18px;border-radius:999px;
    opacity:0;pointer-events:none;transition:.25s;z-index:90}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ===== ad slot ===== */
  .ad-slot{
    margin-top:6px;
    min-height:64px;                 /* reserve space to prevent layout shift */
    display:flex;align-items:center;justify-content:center;
    border:1px dashed var(--line);
    border-radius:14px;
    background:rgba(255,255,255,.02);
    overflow:hidden;
  }
  .ad-slot ins{display:block;width:100%}
  .ad-ph{                            /* placeholder shown until AdSense is live */
    text-align:center;color:var(--muted);font-size:11px;line-height:1.6;padding:12px;
  }
  .ad-ph b{display:block;color:#6d7686;font-size:10px;letter-spacing:.14em;margin-bottom:3px}

  /* ===== footer ===== */
  .footer{margin-top:10px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
  .made-in{
    font-size:11px;font-weight:700;letter-spacing:.22em;color:var(--muted);
    text-align:center;display:inline-flex;align-items:center;gap:9px;
  }
  .made-in::before,.made-in::after{content:"";width:22px;height:1px;background:var(--line)}
  .made-in b{color:var(--accent-soft);font-weight:700;letter-spacing:.22em}
  .footer a{font-size:10px;color:#5c6472;text-decoration:none}
  .footer a:hover{color:var(--muted)}

  /* =========================================================
     RESPONSIVE
     ========================================================= */

  /* 小さいスマホ（iPhone SE 等 / 幅360px以下） */
  @media (max-width:360px){
    :root{--pad-y:13px;--key-fs:20px;--final-fs:29px;--price-fs:26px;--gap:10px}
    .app{padding-left:12px;padding-right:12px}
    .brand h1{font-size:19px}
    .brand-icon{width:30px;height:30px}
    .tax button{padding:6px 8px;font-size:10px}
    .chips button{font-size:13px;padding:10px 0}
    .chips button.custom{font-size:10px}
    .result{gap:10px}
  }

  /* 画面の縦が短い端末 */
  @media (max-height:700px) and (max-width:520px){
    :root{--pad-y:12px;--gap:9px}
    .display{padding:13px 15px}
    .divider{margin:10px 0}
    .hint{display:none}
  }

  /* タブレット・PC：カード状に浮かせて中央表示 */
  @media (min-width:520px){
    body{align-items:center;padding:28px 16px}
    .app{
      max-width:460px;
      background:linear-gradient(180deg,rgba(42,46,58,.55),rgba(30,28,34,.85));
      border:1px solid var(--line);
      border-radius:28px;
      padding:20px 22px 22px;
      box-shadow:0 40px 90px -30px rgba(0,0,0,.85), 0 0 0 1px rgba(255,255,255,.02);
    }
    .pad button,.chips button,.actions button,.tabs button{cursor:pointer}
    .pad button:hover{background:var(--key-press)}
    .chips button:not(.on):hover,.actions button:not(.primary):hover,.tabs button:not(.on):hover{border-color:rgba(255,109,92,.38)}
    .actions .primary:hover{filter:brightness(1.06)}
    .hist-item:hover{background:var(--panel-2)}
    .sheet{border-radius:24px;margin-bottom:24px;max-width:460px}
    .overlay{align-items:center}
  }

  /* 大画面：少しだけゆとりを持たせる */
  @media (min-width:900px){
    :root{--pad-y:17px;--key-fs:23px}
    .app{max-width:480px}
  }

  /* マウス環境ではタップ縮小アニメを控えめに */
  @media (hover:hover) and (pointer:fine){
    .pad button:active{transform:none}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <img class="brand-icon" src="assets/icon-192.png" width="34" height="34" alt="割引電卓アイコン">
      <h1>割引電卓<span class="dot">.</span></h1>
    </div>
    <div class="tax" id="tax">
      <button data-tax="0" class="on">税抜</button>
      <button data-tax="10">+10%</button>
      <button data-tax="8">+8%</button>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <button data-mode="calc" class="on">割引を計算</button>
    <button data-mode="rev">割引率を逆算</button>
  </div>

  <!-- ===== CALC MODE ===== -->
  <section id="calcMode">
    <div class="display">
      <div class="row"><span class="label">元の価格</span><span class="label" id="taxNote"></span></div>
      <div class="price-in empty" id="priceIn"><span class="yen">¥</span>0</div>
      <div class="divider"></div>
      <div class="result">
        <div class="tag"><small>OFF</small><span id="tagPct">0</span>%</div>
        <div class="out">
          <div class="final" id="final"><span class="yen">¥</span>0</div>
          <div class="save" id="save">−¥0 <span class="pct">お得</span></div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button class="primary" id="saveBtn">
        <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
        履歴に保存
      </button>
      <button id="histBtn">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        履歴 <span class="badge" id="histCount" style="display:none">0</span>
      </button>
    </div>

    <div class="chips" id="chips">
      <button data-off="5">5%</button>
      <button data-off="10" class="on">10%</button>
      <button data-off="15">15%</button>
      <button data-off="20">20%</button>
      <button data-off="30">30%</button>
      <button data-off="40">40%</button>
      <button data-off="50">50%</button>
      <button data-off="60">60%</button>
      <button data-off="70">70%</button>
      <button data-off="custom" class="custom">カスタム</button>
    </div>

    <div class="pad" id="pad">
      <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button><button data-k="back" class="fn">⌫</button>
      <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button><button data-k="00" class="fn">00</button>
      <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button><button data-k="clear" class="clr">C</button>
      <button data-k="0" style="grid-column:span 2">0</button><button data-k="000" class="fn">000</button><button data-k="clear2" class="clr">AC</button>
    </div>
    <div class="hint">オフ率をタップ → 価格を入力するだけ</div>
  </section>

  <!-- ===== REVERSE MODE ===== -->
  <section id="revMode" class="rev">
    <div class="field active" data-f="orig"><span class="label">元の価格</span><span class="v empty" id="origV"><span class="yen">¥</span>0</span></div>
    <div class="field" data-f="sale"><span class="label">割引後の価格</span><span class="v empty" id="saleV"><span class="yen">¥</span>0</span></div>
    <div class="rev-out"><div class="big" id="revPct">—</div><div class="sub" id="revSub">割引後の価格を入力すると割引率を表示</div></div>
    <div class="pad" id="revpad">
      <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button><button data-k="back" class="fn">⌫</button>
      <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button><button data-k="00" class="fn">00</button>
      <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button><button data-k="clear" class="clr">C</button>
      <button data-k="0" style="grid-column:span 2">0</button><button data-k="000" class="fn">000</button><button data-k="clear2" class="clr">AC</button>
    </div>
    <div class="hint">入力する欄をタップして切り替え</div>
  </section>

  <!-- ===== FOOTER AD SLOT ===== -->
  <div class="ad-slot" id="adSlot">
    <div class="ad-ph" id="adPlaceholder">
      <b>SPONSORED</b>
      広告枠（審査通過後にここへ表示されます）
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <div class="footer">
    <div class="made-in">MADE IN <b>JUKU-CHO</b></div>
    <a href="privacy.html">プライバシーポリシー</a>
  </div>
</div>

<!-- ===== CUSTOM % MODAL ===== -->
<div class="overlay" id="custOverlay">
  <div class="sheet">
    <div class="sheet-head"><h2>割引率を入力</h2><button class="x" id="custClose">×</button></div>
    <div class="cust-display"><span id="custVal">0</span><span class="u">%</span></div>
    <div class="pad" id="custpad">
      <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button><button data-k="back" class="fn">⌫</button>
      <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button><button data-k="clear" class="clr">C</button>
      <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button><button data-k="0">0</button>
    </div>
    <button class="cust-set" id="custSet">この割引率に設定</button>
  </div>
</div>

<!-- ===== HISTORY SHEET ===== -->
<div class="overlay" id="histOverlay">
  <div class="sheet">
    <div class="sheet-head"><h2>計算履歴</h2><button class="x" id="histClose">×</button></div>
    <div class="hist-list" id="histList"></div>
    <button class="hist-clear" id="histClear" style="display:none">すべて削除</button>
  </div>
</div>

<div class="toast" id="toast">履歴に保存しました</div>

<script>
const yen = n => "¥" + Math.round(n).toLocaleString("ja-JP");
const fmtField = (el,val)=>{el.classList.toggle("empty",val===0);el.innerHTML='<span class="yen">¥</span>'+val.toLocaleString("ja-JP");};

let price=0, off=10, tax=0;

let history = [];
const KEY="jukucho_discount_history";
try{ const s=localStorage.getItem(KEY); if(s) history=JSON.parse(s); }catch(e){}
function persist(){ try{ localStorage.setItem(KEY, JSON.stringify(history)); }catch(e){} }

const priceIn=document.getElementById("priceIn"),finalEl=document.getElementById("final"),
      saveEl=document.getElementById("save"),tagPct=document.getElementById("tagPct"),taxNote=document.getElementById("taxNote");
function curTaxed(){ return price*(1+tax/100); }
function curFinal(){ return curTaxed()*(1-off/100); }
function render(){
  fmtField(priceIn,price);
  const taxed=curTaxed(), final=curFinal(), saved=taxed-final;
  finalEl.innerHTML='<span class="yen">¥</span>'+Math.round(final).toLocaleString("ja-JP");
  saveEl.innerHTML='−'+yen(saved)+' <span class="pct">お得</span>';
  tagPct.textContent=off;
  taxNote.textContent=tax?("税込 "+yen(taxed)):"";
}

function press(target,key,max=99999999){
  let s=String(target);
  if(key==="clear"||key==="clear2") return 0;
  if(key==="back") return s.length<=1?0:Number(s.slice(0,-1));
  if(s==="0") s="";
  if(key==="00") s+="00"; else if(key==="000") s+="000"; else s+=key;
  let n=Number(s); if(n>max) n=max; return n;
}
document.getElementById("pad").addEventListener("click",e=>{const k=e.target.dataset.k;if(!k)return;price=press(price,k);render();});

const chips=document.getElementById("chips");
const customBtn=chips.querySelector('[data-off="custom"]');
function selectChip(btn){ chips.querySelectorAll("button").forEach(x=>x.classList.remove("on")); btn.classList.add("on"); }
chips.addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  if(b.dataset.off==="custom"){ openCustom(); return; }
  off=Number(b.dataset.off); selectChip(b); customBtn.textContent="カスタム"; render();
});

const custOverlay=document.getElementById("custOverlay"), custVal=document.getElementById("custVal");
let custNum=0;
function openCustom(){ custNum=(customBtn.classList.contains("on")? off : 0); custVal.textContent=custNum; custOverlay.classList.add("on"); }
function closeCustom(){ custOverlay.classList.remove("on"); }
document.getElementById("custClose").addEventListener("click",closeCustom);
custOverlay.addEventListener("click",e=>{ if(e.target===custOverlay) closeCustom(); });
document.getElementById("custpad").addEventListener("click",e=>{
  const k=e.target.dataset.k; if(!k)return; custNum=press(custNum,k,100); custVal.textContent=custNum;
});
document.getElementById("custSet").addEventListener("click",()=>{
  off=Math.max(0,Math.min(100,custNum));
  selectChip(customBtn); customBtn.textContent=off+"% OFF"; render(); closeCustom();
});

document.getElementById("tax").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return; tax=Number(b.dataset.tax);
  document.querySelectorAll("#tax button").forEach(x=>x.classList.remove("on")); b.classList.add("on"); render();
});

document.getElementById("tabs").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return; const mode=b.dataset.mode;
  document.querySelectorAll("#tabs button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
  document.getElementById("calcMode").style.display=mode==="calc"?"block":"none";
  document.getElementById("revMode").classList.toggle("on",mode==="rev");
});

let orig=0,sale=0,activeF="orig";
const origV=document.getElementById("origV"),saleV=document.getElementById("saleV"),
      revPct=document.getElementById("revPct"),revSub=document.getElementById("revSub");
function revRender(){
  fmtField(origV,orig); fmtField(saleV,sale);
  if(orig>0 && sale<=orig){ const pct=(1-sale/orig)*100;
    revPct.textContent=(Math.round(pct*10)/10)+"% OFF"; revSub.textContent="割引額 "+yen(orig-sale);
  } else if(sale>orig){ revPct.textContent="—"; revSub.textContent="割引後が元価格を超えています";
  } else { revPct.textContent="—"; revSub.textContent="割引後の価格を入力すると割引率を表示"; }
}
document.querySelectorAll(".field").forEach(f=>f.addEventListener("click",()=>{
  activeF=f.dataset.f; document.querySelectorAll(".field").forEach(x=>x.classList.remove("active")); f.classList.add("active");
}));
document.getElementById("revpad").addEventListener("click",e=>{
  const k=e.target.dataset.k; if(!k)return;
  if(activeF==="orig") orig=press(orig,k); else sale=press(sale,k); revRender();
});

const histBtn=document.getElementById("histBtn"),histCount=document.getElementById("histCount"),
      histOverlay=document.getElementById("histOverlay"),histList=document.getElementById("histList"),
      histClear=document.getElementById("histClear"),toast=document.getElementById("toast");
function updateBadge(){ histCount.style.display=history.length?"inline-flex":"none"; histCount.textContent=history.length; }
function showToast(msg){ toast.textContent=msg; toast.classList.add("on"); setTimeout(()=>toast.classList.remove("on"),1500); }

document.getElementById("saveBtn").addEventListener("click",()=>{
  if(price<=0){ showToast("価格を入力してください"); return; }
  const taxed=curTaxed(), final=curFinal();
  history.unshift({price,off,tax,final:Math.round(final),saved:Math.round(taxed-final),ts:Date.now()});
  if(history.length>50) history.pop();
  persist(); updateBadge(); showToast("履歴に保存しました");
});

function timeLabel(ts){ const d=new Date(ts),p=n=>String(n).padStart(2,"0");
  return `${d.getMonth()+1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`; }
function renderHistory(){
  histList.innerHTML="";
  if(!history.length){ histList.innerHTML='<div class="hist-empty">まだ履歴がありません</div>'; histClear.style.display="none"; return; }
  histClear.style.display="block";
  history.forEach((h,i)=>{
    const taxLbl=h.tax?`税込${h.tax}%`:"税抜";
    const el=document.createElement("div"); el.className="hist-item";
    el.innerHTML=`<div class="hist-tag">${h.off}%<br><span style="font-size:9px">OFF</span></div>
      <div class="hist-mid"><div class="pf"><s>${yen(h.price)}</s>${yen(h.final)}</div>
      <div class="meta">−${yen(h.saved)}お得 ・ ${taxLbl} ・ ${timeLabel(h.ts)}</div></div>
      <button class="hist-del" data-i="${i}">×</button>`;
    el.addEventListener("click",ev=>{
      if(ev.target.classList.contains("hist-del")) return;
      price=h.price; off=h.off; tax=h.tax;
      document.querySelectorAll("#tax button").forEach(x=>x.classList.toggle("on",Number(x.dataset.tax)===tax));
      const match=[...chips.querySelectorAll("button")].find(b=>Number(b.dataset.off)===off);
      chips.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
      if(match){ match.classList.add("on"); customBtn.textContent="カスタム"; }
      else { customBtn.classList.add("on"); customBtn.textContent=off+"% OFF"; }
      render(); closeHist(); showToast("履歴を呼び出しました");
    });
    el.querySelector(".hist-del").addEventListener("click",()=>{ history.splice(i,1); persist(); updateBadge(); renderHistory(); });
    histList.appendChild(el);
  });
}
function openHist(){ renderHistory(); histOverlay.classList.add("on"); }
function closeHist(){ histOverlay.classList.remove("on"); }
histBtn.addEventListener("click",openHist);
document.getElementById("histClose").addEventListener("click",closeHist);
histOverlay.addEventListener("click",e=>{ if(e.target===histOverlay) closeHist(); });
histClear.addEventListener("click",()=>{ history=[]; persist(); updateBadge(); renderHistory(); });

/* PCのキーボード入力にも対応（Web表示時の使い勝手向上） */
document.addEventListener("keydown",e=>{
  if(custOverlay.classList.contains("on")||histOverlay.classList.contains("on")){
    if(e.key==="Escape"){ closeCustom(); closeHist(); }
    return;
  }
  const isRev=document.getElementById("revMode").classList.contains("on");
  let k=null;
  if(/^[0-9]$/.test(e.key)) k=e.key;
  else if(e.key==="Backspace") k="back";
  else if(e.key==="Escape"||e.key.toLowerCase()==="c") k="clear";
  if(!k) return;
  e.preventDefault();
  if(isRev){ if(activeF==="orig") orig=press(orig,k); else sale=press(sale,k); revRender(); }
  else { price=press(price,k); render(); }
});

updateBadge(); render(); revRender();
</script>
<script>
/* =========================================================
   AD CONFIG  —  AdSense承認後、ここだけ書き換えてください
   1. ENABLED を true に
   2. CLIENT に発行された ca-pub-XXXXXXXXXXXXXXXX を貼る
   3. SLOT に広告ユニットのスロットID（数字）を貼る
   ========================================================= */
const AD_CONFIG = {
  ENABLED: false,
  CLIENT : "ca-pub-XXXXXXXXXXXXXXXX",
  SLOT   : "XXXXXXXXXX"
};

(function initAds(){
  if(!AD_CONFIG.ENABLED) return;                    // 未承認のうちはプレースホルダーのまま
  if(!navigator.onLine) return;                     // オフライン時は枠を出さない
  const slot = document.getElementById("adSlot");
  const ph   = document.getElementById("adPlaceholder");

  // AdSense本体を読み込む
  const s = document.createElement("script");
  s.async = true;
  s.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=" + AD_CONFIG.CLIENT;
  s.crossOrigin = "anonymous";
  s.onerror = () => { slot.style.display = "none"; };   // ブロック時は枠ごと隠す
  document.head.appendChild(s);

  // 広告ユニットを差し込む
  const ins = document.createElement("ins");
  ins.className = "adsbygoogle";
  ins.style.display = "block";
  ins.setAttribute("data-ad-client", AD_CONFIG.CLIENT);
  ins.setAttribute("data-ad-slot",   AD_CONFIG.SLOT);
  ins.setAttribute("data-ad-format", "horizontal");
  ins.setAttribute("data-full-width-responsive", "true");
  ph.remove();
  slot.appendChild(ins);

  try { (window.adsbygoogle = window.adsbygoogle || []).push({}); }
  catch(e){ slot.style.display = "none"; }
})();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(err => console.log("SW registration failed:", err));
  });
}
</script>
