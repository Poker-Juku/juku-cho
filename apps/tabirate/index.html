<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0B0D10" id="metaTheme">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>TABI-RATE — Currency Converter</title>
<style>
  /* ============ tokens (8px grid, single accent) ============ */
  [data-theme="dark"]{
    --bg:#0B0D10;
    --raise:#14171C;
    --raise-2:#1B1F26;
    --ink:#F2F4F7;
    --ink-2:#9AA3AF;
    --ink-3:#5C6572;
    --hair:rgba(255,255,255,.07);
    --accent:#34D399;
    --accent-dim:rgba(52,211,153,.12);
    --accent-ink:#34D399;
    --r:16px;
  }
  [data-theme="light"]{
    --bg:#F7F8FA;
    --raise:#FFFFFF;
    --raise-2:#F0F2F5;
    --ink:#0E1116;
    --ink-2:#5F6875;
    --ink-3:#98A0AC;
    --hair:rgba(14,17,22,.08);
    --accent:#0E9F6E;
    --accent-dim:rgba(14,159,110,.10);
    --accent-ink:#0B7D57;
    --r:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;position:fixed;width:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Hiragino Sans","Noto Sans JP","Segoe UI",sans-serif;
    background:var(--bg);color:var(--ink);display:flex;justify-content:center;
    -webkit-font-smoothing:antialiased;touch-action:manipulation;
    transition:background .2s,color .2s;
  }
  /* ambient light — single subtle glow, not a gradient stack */
  body::before{content:"";position:fixed;top:-160px;left:50%;transform:translateX(-50%);
    width:420px;height:340px;border-radius:50%;pointer-events:none;z-index:0;
    background:radial-gradient(closest-side,var(--accent-dim),transparent 100%);opacity:.9}
  .app{position:relative;z-index:1;width:100%;max-width:440px;height:100dvh;display:flex;flex-direction:column;
    padding:env(safe-area-inset-top) 16px calc(8px + env(safe-area-inset-bottom));overflow:hidden}

  /* ============ header ============ */
  .hdr{flex:0 0 auto;display:flex;align-items:center;gap:8px;height:64px;margin-top:8px}
  .brand{flex:1;min-width:0;display:flex;align-items:center;gap:10px}
  .glyph{width:36px;height:36px;flex:0 0 auto;border-radius:11px;position:relative;
    background:linear-gradient(160deg,var(--raise-2),var(--raise));border:1px solid var(--hair);
    display:grid;place-items:center;overflow:hidden}
  .glyph::after{content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 30% 20%,var(--accent-dim),transparent 65%);pointer-events:none}
  .glyph svg{width:19px;height:19px;color:var(--accent);position:relative;z-index:1}
  .wm{min-width:0}
  .wm .t{display:flex;align-items:center;gap:6px;font-size:17px;font-weight:800;letter-spacing:.14em;
    line-height:1;white-space:nowrap}
  .wm .t .sep{width:12px;height:1.5px;background:var(--accent);border-radius:1px;flex:0 0 auto;opacity:.9}
  .wm .s{font-size:9px;font-weight:600;color:var(--ink-3);letter-spacing:.26em;
    margin-top:5px;white-space:nowrap;text-transform:uppercase}
  .gear{width:40px;height:40px;flex:0 0 auto;border-radius:12px;background:var(--raise);border:1px solid var(--hair);
    color:var(--ink-2);display:grid;place-items:center;cursor:pointer;transition:.15s}
  .gear:active{transform:scale(.94);color:var(--ink)}
  .gear svg{width:18px;height:18px}

  /* ============ segmented tabs ============ */
  .tabs{flex:0 0 auto;display:flex;gap:4px;background:var(--raise);border:1px solid var(--hair);
    border-radius:14px;padding:4px;margin-bottom:16px}
  .tab{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;gap:6px;height:36px;
    border:none;background:transparent;border-radius:10px;cursor:pointer;
    font-size:12px;font-weight:600;color:var(--ink-3);transition:background .15s,color .15s;
    white-space:nowrap;overflow:hidden}
  .tab .fl{font-size:15px;line-height:1;flex:0 0 auto}
  .tab .nm{overflow:hidden;text-overflow:ellipsis}
  .tab.on{background:var(--raise-2);color:var(--ink)}

  /* ============ rate line (hairline, not a card) ============ */
  .rate{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:0 4px 12px;
    border-bottom:1px solid var(--hair);margin-bottom:8px}
  .rate .pair{font-size:11px;font-weight:700;color:var(--ink-3);letter-spacing:.1em;flex:0 0 auto}
  .rate .val{font-size:15px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .rate .live{width:5px;height:5px;border-radius:50%;background:var(--accent);flex:0 0 auto;
    box-shadow:0 0 0 0 var(--accent);animation:pulse 2.4s infinite}
  .rate .live.warn{background:#E0894A;animation:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,.4)}70%{box-shadow:0 0 0 6px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}
  .rate .when{font-size:10px;color:var(--ink-3);margin-left:auto;font-variant-numeric:tabular-nums}
  .rate .act{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--ink-3);
    display:grid;place-items:center;cursor:pointer;transition:.15s;flex:0 0 auto}
  .rate .act:active{background:var(--raise-2);color:var(--ink)}
  .rate .act svg{width:15px;height:15px}
  .rate .act.spin svg{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ============ converter — the hero ============ */
  .conv{flex:0 0 auto;position:relative}
  .row{padding:16px 8px;cursor:pointer;border-radius:var(--r);transition:background .15s}
  .row.on{background:var(--raise)}
  .row-head{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .fl-big{font-size:20px;line-height:1;flex:0 0 auto}
  .iso{font-size:13px;font-weight:800;letter-spacing:.06em;color:var(--ink)}
  .cname{font-size:11px;font-weight:600;color:var(--ink-3)}
  .caret{margin-left:auto;font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.12em;opacity:0;transition:.15s}
  .row.on .caret{opacity:1}
  .row-val{display:flex;align-items:baseline;gap:8px}
  .sym{font-size:20px;font-weight:600;color:var(--ink-3);flex:0 0 auto}
  .amt{flex:1;min-width:0;text-align:right;font-size:40px;font-weight:700;letter-spacing:-.025em;
    font-variant-numeric:tabular-nums;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    transition:color .15s}
  .amt.zero{color:var(--ink-3)}
  .row.on .amt{color:var(--accent)}
  .mid{display:flex;align-items:center;gap:8px;padding:0 8px}
  .mid .ln{flex:1;height:1px;background:var(--hair)}
  .swap{width:32px;height:32px;border-radius:50%;background:var(--raise-2);border:1px solid var(--hair);
    color:var(--ink-2);display:grid;place-items:center;cursor:pointer;transition:transform .2s,color .15s;flex:0 0 auto}
  .swap:active{transform:rotate(180deg);color:var(--accent)}
  .swap svg{width:14px;height:14px}

  /* ============ bottom zone ============ */
  .zone{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;justify-content:flex-end;padding-top:8px}
  .pane{display:none}
  .pane.on{display:flex;flex-direction:column;flex:1 1 auto;min-height:0;justify-content:flex-end}

  /* quick — hairline pills, no cards */
  .quick{display:flex;gap:8px;padding-bottom:8px}
  .qg{flex:1 1 0;min-width:0}
  .qg-h{font-size:9px;font-weight:700;color:var(--ink-3);letter-spacing:.14em;margin:0 0 8px 2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .qg-b{display:flex;gap:6px}
  .qb{flex:1 1 0;min-width:0;height:32px;border:1px solid var(--hair);background:transparent;border-radius:10px;
    font-size:11px;font-weight:600;color:var(--ink-2);cursor:pointer;font-variant-numeric:tabular-nums;
    transition:.12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 2px}
  .qb:active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

  /* keypad */
  .kp{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;gap:8px}
  .kp-top{display:flex;align-items:center;justify-content:space-between;flex:0 0 auto;padding:0 2px}
  .kp-top .l{font-size:10px;font-weight:700;color:var(--ink-3);letter-spacing:.14em}
  .kp-top .done{border:none;background:transparent;color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;padding:4px 8px}
  .kp-g{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:8px;flex:1 1 auto;min-height:0}
  .kp-g button{border:none;border-radius:14px;background:var(--raise);color:var(--ink);
    font-size:20px;font-weight:600;cursor:pointer;font-variant-numeric:tabular-nums;transition:.1s;padding:0;min-height:0}
  .kp-g button:active{background:var(--raise-2);transform:scale(.96)}
  .kp-g button.u{color:var(--ink-3);font-size:16px;background:transparent}
  .kp-g button.u:active{background:var(--raise)}
  .kp-g button.go{background:var(--accent);color:#04150E;font-size:14px;font-weight:700}
  .kp-g button.dis{opacity:.25;pointer-events:none}

  /* ad + footer */
  .ad{flex:0 0 auto;height:56px;margin-top:8px;border-radius:12px;background:var(--raise);
    border:1px solid var(--hair);display:grid;place-items:center;overflow:hidden}
  .ad span{font-size:9px;color:var(--ink-3);letter-spacing:.18em;font-weight:700}
  .foot{flex:0 0 auto;text-align:center;font-size:9px;color:var(--ink-3);letter-spacing:.14em;
    font-weight:600;padding:8px 0 0}
  .foot b{color:var(--ink-2);font-weight:700}

  /* ============ sheet ============ */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;visibility:hidden;transition:.2s;z-index:40}
  .scrim.show{opacity:1;visibility:visible}
  .sheet{position:fixed;left:0;right:0;bottom:0;max-width:440px;margin:0 auto;background:var(--bg);
    border-top:1px solid var(--hair);border-radius:24px 24px 0 0;z-index:41;
    transform:translateY(100%);transition:transform .24s cubic-bezier(.32,.72,0,1);
    height:88dvh;display:flex;flex-direction:column}
  .sheet.show{transform:translateY(0)}
  .grip{width:36px;height:4px;border-radius:2px;background:var(--hair);margin:8px auto 0;flex:0 0 auto}
  .sh{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px;flex:0 0 auto}
  .sh h2{font-size:17px;font-weight:700}
  .sh .x{width:32px;height:32px;border-radius:50%;border:1px solid var(--hair);background:var(--raise);
    color:var(--ink-2);font-size:15px;cursor:pointer}
  .sb{overflow-y:auto;padding:0 16px calc(24px + env(safe-area-inset-bottom));flex:1 1 auto;
    -webkit-overflow-scrolling:touch;overscroll-behavior:contain}
  .lbl{font-size:10px;font-weight:700;color:var(--ink-3);letter-spacing:.16em;margin:24px 2px 8px}
  .lbl:first-child{margin-top:8px}
  .lbl .c{color:var(--accent);margin-left:8px}
  .rgh{font-size:11px;font-weight:600;color:var(--ink-2);margin:16px 2px 8px}
  .rgg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .ec{position:relative;display:flex;align-items:center;gap:8px;height:44px;padding:0 32px 0 12px;border-radius:12px;
    border:1px solid var(--hair);background:var(--raise);cursor:pointer;font-size:12px;font-weight:600;
    color:var(--ink-2);transition:.12s;text-align:left}
  .ec .f{font-size:16px;flex:0 0 auto}
  .ec .n{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ec.on{border-color:var(--accent);background:var(--accent-dim);color:var(--ink)}
  .ec .o{position:absolute;right:8px;width:18px;height:18px;border-radius:50%;background:var(--accent);color:#04150E;
    font-size:10px;display:none;place-items:center;font-weight:800}
  .ec.on .o{display:grid}
  .hint{font-size:10px;color:var(--ink-3);margin:8px 2px 0;line-height:1.6}
  .langs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .langs button{height:44px;border:1px solid var(--hair);background:var(--raise);border-radius:12px;
    font-size:12px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:.12s;padding:0 4px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .langs button.on{border-color:var(--accent);background:var(--accent-dim);color:var(--ink)}
  .seg{display:flex;background:var(--raise);border:1px solid var(--hair);border-radius:12px;padding:4px;gap:4px}
  .seg button{flex:1;border:none;background:transparent;height:36px;border-radius:9px;font-size:12px;
    font-weight:600;color:var(--ink-3);cursor:pointer;transition:.15s}
  .seg button.on{background:var(--raise-2);color:var(--ink)}
  .qe{background:var(--raise);border:1px solid var(--hair);border-radius:12px;padding:0 12px}
  .qer{display:flex;align-items:center;gap:8px;padding:12px 0}
  .qer+.qer{border-top:1px solid var(--hair)}
  .qer>span{font-size:12px;font-weight:600;color:var(--ink-2);min-width:72px}
  .qeb{display:flex;gap:8px;flex:1}
  .qeb button{flex:1;border:1px solid var(--hair);background:transparent;border-radius:8px;height:32px;font-size:12px;
    font-weight:600;color:var(--ink);cursor:pointer;font-variant-numeric:tabular-nums}
  .qeb button:active{border-color:var(--accent);color:var(--accent)}
  .spk{background:var(--raise);border:1px solid var(--hair);border-radius:12px;padding:12px;margin-bottom:8px}
  .spk b{font-size:11px;color:var(--ink-2);font-weight:600}
  .spark{width:100%;height:40px;display:block;margin-top:8px}
  .spk-e{font-size:10px;color:var(--ink-3);margin-top:8px}
  .cc{background:var(--raise);border:1px solid var(--hair);border-radius:12px;margin-bottom:8px;overflow:hidden}
  .cch{display:flex;align-items:center;gap:12px;padding:12px;cursor:pointer}
  .cch .f{font-size:20px}.cch .i{flex:1;min-width:0}
  .cch .i b{font-size:13px;font-weight:600;color:var(--ink)}
  .cch .i small{display:block;font-size:10px;color:var(--ink-3);margin-top:2px}
  .cch .lt{font-size:12px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
  .cch .lt small{display:block;color:var(--ink-3);font-size:10px;margin-top:2px}
  .ccb{display:none;border-top:1px solid var(--hair);padding:8px 12px 12px}
  .cc.open .ccb{display:block}
  .hr{display:flex;align-items:center;gap:8px;padding:8px 0}
  .hr+.hr{border-top:1px solid var(--hair)}
  .hr .d{font-size:11px;color:var(--ink-3);font-variant-numeric:tabular-nums;min-width:72px}
  .hr .v{font-size:12px;font-weight:600;font-variant-numeric:tabular-nums}
  .hr .n{flex:1;font-size:11px;color:var(--accent);background:var(--accent-dim);padding:2px 8px;border-radius:6px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hr .x{margin-left:auto;color:var(--ink-3);font-size:12px;cursor:pointer;background:none;border:none}
  .he{font-size:11px;color:var(--ink-3);padding:8px 0}
  .ra{display:flex;gap:8px;margin-top:8px}
  .ra button{flex:1;border:1px solid var(--hair);border-radius:8px;height:32px;font-size:11px;font-weight:600;cursor:pointer;background:transparent}
  .ra .r1{color:var(--accent);border-color:var(--accent)}
  .ra .r2{color:var(--ink-3)}
  .dg{width:100%;background:transparent;color:#F87171;border:1px solid rgba(248,113,113,.3);border-radius:12px;
    height:44px;font-size:12px;font-weight:600;cursor:pointer;margin-top:8px}
  .note{font-size:10px;color:var(--ink-3);text-align:center;line-height:1.8;margin-top:24px}

  /* drum */
  .dscrim{position:fixed;inset:0;background:rgba(0,0,0,.6);opacity:0;visibility:hidden;transition:.2s;z-index:70}
  .dscrim.show{opacity:1;visibility:visible}
  .drum{position:fixed;left:0;right:0;bottom:0;max-width:440px;margin:0 auto;background:var(--bg);
    border-top:1px solid var(--hair);border-radius:24px 24px 0 0;z-index:71;transform:translateY(100%);
    transition:transform .24s cubic-bezier(.32,.72,0,1);padding-bottom:env(safe-area-inset-bottom)}
  .drum.show{transform:translateY(0)}
  .dh{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--hair)}
  .dh .t{font-size:13px;font-weight:600}
  .dh button{background:none;border:none;font-size:13px;font-weight:600;color:var(--ink-3);cursor:pointer;padding:4px 8px}
  .dh button.ok{color:var(--accent);font-weight:700}
  .dw{position:relative;height:200px;overflow:hidden}
  .dm{position:absolute;left:16px;right:16px;top:80px;height:40px;border-radius:10px;background:var(--raise);pointer-events:none;z-index:1}
  .dl{height:200px;overflow-y:scroll;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;position:relative;z-index:2;overscroll-behavior:contain}
  .dl::-webkit-scrollbar{display:none}
  .di{height:40px;scroll-snap-align:center;display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:600;color:var(--ink-3);font-variant-numeric:tabular-nums;transition:.1s}
  .di.sel{color:var(--ink);font-size:19px;font-weight:700}
  .dp{height:80px}

  .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(16px);
    background:var(--raise-2);border:1px solid var(--hair);color:var(--ink);padding:12px 20px;border-radius:999px;
    font-size:12px;font-weight:600;opacity:0;transition:.2s;z-index:80;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-height:700px){
    .amt{font-size:34px}
    .row{padding:12px 8px}
    .hdr{height:48px}
  }
</style>
</head>
<body>
<div class="app">

  <header class="hdr">
    <div class="brand">
      <div class="glyph">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 12.5 6.5 5M12 12.5 17.5 5M12 12.5V19"/>
          <path d="M7.5 13.5h9M7.5 16.5h9"/>
        </svg>
      </div>
      <div class="wm">
        <div class="t">TABI<span class="sep"></span>RATE</div>
        <div class="s">Currency Converter</div>
      </div>
    </div>
    <button class="gear" id="myBtn" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <div class="rate">
    <span class="live" id="dot"></span>
    <span class="pair" id="pair">JPY / CNY</span>
    <span class="val" id="rateVal">—</span>
    <span class="when" id="when">—</span>
    <button class="act" id="recBtn" aria-label="記録">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
    </button>
    <button class="act" id="refBtn" aria-label="更新">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
    </button>
  </div>

  <div class="conv">
    <div class="row" id="rJpy">

  var side='jpy',raw='',replaceNext=false,kpOpen=false;
  var qJpy=[5000,10000,50000],qFor=[1000,5000,10000];
  var LADDER=[100,300,500,1000,2000,3000,5000,10000,20000,30000,50000,100000,200000,300000,500000,1000000];
  var drumTarget=null;

  var $=function(id){return document.getElementById(id);};
  function todayKey(){var d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
  function fmtDate(d){return ('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2);}
  function fmtFull(d){return d.getFullYear()+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2);}
  function nf(n,dec){return new Intl.NumberFormat('ja-JP',{minimumFractionDigits:dec,maximumFractionDigits:dec}).format(n);}
  function getRate(c){return rates[c]||byCode[c].fb;}
  function groupInt(s){return s.replace(/\B(?=(\d{3})+(?!\d))/g,',');}
  function loadHist(){try{return JSON.parse(localStorage.getItem(KEY_HIST)||'{}');}catch(e){return {};}}
  function saveHist(h){try{localStorage.setItem(KEY_HIST,JSON.stringify(h));}catch(e){}}
  function saveCfg(){try{localStorage.setItem(KEY_CFG,JSON.stringify({displayed:displayed,active:active,theme:theme,qJpy:qJpy,qFor:qFor,lang:lang}));}catch(e){}}
  function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},1600);}

  function applyLang(){
    document.documentElement.setAttribute('lang',lang);
    $('tSettings').textContent=t('settings');
    $('tLang').textContent=t('language');
    $('tCountries').textContent=t('countries');
    $('tHintC').textContent=t('hintC');
    $('tQuick').textContent=t('quick');
    $('tHintQ').textContent=t('hintQ');
    $('tAppearance').textContent=t('appearance');
    $('tLight').textContent=t('light');
    $('tDark').textContent=t('dark');
    $('tSystem').textContent=t('system');
    $('tHistory').textContent=t('history');
    $('wipeBtn').textContent=t('wipe');
    $('tNote').textContent=t('note');
    $('drumCancel').textContent=t('cancel');
    $('drumOk').textContent=t('ok');
    $('kpDone').textContent=t('done');
    var g=$('kpGrid').querySelector('.go');if(g)g.textContent=t('done');
    var cl=lang==='ja'?'入力中':lang==='en'?'EDITING':lang==='zh'?'输入中':lang==='ko'?'입력 중':lang==='vi'?'ĐANG NHẬP':'กำลังป้อน';
    $('caretJ').textContent=cl;$('caretF').textContent=cl;
    var seg=$('langSeg');seg.innerHTML='';
    LANGS.forEach(function(L){var b=document.createElement('button');b.textContent=L.n;
      b.className=(L.c===lang?'on':'');b.onclick=function(){lang=L.c;saveCfg();applyLang();renderAll();
        renderEdit();renderQEdit();renderHist();renderSpark();};seg.appendChild(b);});
  }

  var mq=window.matchMedia?matchMedia('(prefers-color-scheme: dark)'):null;
  function applyTheme(){
    var real=theme;if(theme==='system')real=(mq&&mq.matches)?'dark':'light';
    document.documentElement.setAttribute('data-theme',real);
    $('metaTheme').setAttribute('content',real==='dark'?'#0B0D10':'#F7F8FA');
    document.querySelectorAll('#themeSeg button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-th')===theme);});
  }
  if(mq&&mq.addEventListener)mq.addEventListener('change',function(){if(theme==='system'){applyTheme();renderSpark();}});

  function decOf(){return side==='for'?byCode[active].dec:0;}
  function curNums(){var r=getRate(active);
    if(side==='for'){var f=raw===''?0:parseFloat(raw||'0');return{jpy:f*r,for:f};}
    var j=raw===''?0:parseFloat(raw||'0');return{jpy:j,for:j/r};}
  function seed(n,dec){if(!n||!isFinite(n))return '';return dec>0?String(n.toFixed(dec)).replace(/\.?0+$/,''):String(Math.round(n));}
  function fmtRaw(s){if(s==='')return '0';var p=s.split('.');var ip=p[0].replace(/^0+(?=\d)/,'');if(ip==='')ip='0';ip=groupInt(ip);
    if(p.length>1)return ip+'.'+p[1];if(s.slice(-1)==='.')return ip+'.';return ip;}
  function renderConv(){
    var c=byCode[active],r=getRate(active),js,fs,jz,fz;
    if(side==='for'){var fN=raw===''?0:parseFloat(raw||'0');fs=raw===''?'0':fmtRaw(raw);fz=(fN===0);var jN=fN*r;js=nf(jN,0);jz=(jN===0);}
    else{var j2=raw===''?0:parseFloat(raw||'0');js=raw===''?'0':fmtRaw(raw);jz=(j2===0);var f2=j2/r;fs=nf(f2,c.dec);fz=(f2===0);}
    var je=$('jpy');je.textContent=js;je.classList.toggle('zero',jz);
    var fe=$('for');fe.textContent=fs;fe.classList.toggle('zero',fz);
    $('rJpy').classList.toggle('on',kpOpen&&side==='jpy');
    $('rFor').classList.toggle('on',kpOpen&&side==='for');
  }
  function appendDigits(cur,d,dec){var p=(cur+d).split('.');
    p[0]=p[0].replace(/^0+(?=\d)/,'');if(p[0]==='')p[0]='0';
    if(p[1]!==undefined&&p[1].length>dec)return cur;
    if(p[0].replace(/^0/,'').length>12)return cur;
    return p.join('.');}
  function press(k){var dec=decOf();
    if(k==='C'){raw='';replaceNext=false;}
    else if(k==='BS'){replaceNext=false;raw=raw.slice(0,-1);}
    else if(k==='.'){if(dec>0&&raw.indexOf('.')<0){if(replaceNext){raw='';replaceNext=false;}if(raw==='')raw='0';raw+='.';}}
    else if(k==='DONE'){closeKp();return;}
    else{if(replaceNext){raw='';replaceNext=false;}raw=appendDigits(raw,k,dec);}
    renderConv();}
  function focusSide(w){var n=curNums();
    if(w==='jpy'){side='jpy';raw=seed(n.jpy,0);}else{side='for';raw=seed(n.for,byCode[active].dec);}
    replaceNext=true;openKp();renderConv();}
  function openKp(){kpOpen=true;$('paneQuick').classList.remove('on');$('paneKp').classList.add('on');updateKp();}
  function closeKp(){kpOpen=false;$('paneKp').classList.remove('on');$('paneQuick').classList.add('on');renderConv();}
  function updateKp(){var c=byCode[active];$('kpLabel').textContent=side==='for'?c.code:'JPY';$('dotBtn').classList.toggle('dis',decOf()===0);}

  function renderTabs(){var t2=$('tabs');t2.innerHTML='';
    displayed.forEach(function(code){var c=byCode[code];var el=document.createElement('button');el.className='tab'+(code===active?' on':'');
      el.innerHTML='<span class="fl">'+c.flag+'</span><span class="nm">'+cname(c)+'</span>';
      el.onclick=function(){active=code;saveCfg();renderAll();if(kpOpen)updateKp();};t2.appendChild(el);});}
  function renderRate(){var c=byCode[active],r=getRate(active);
    $('pair').textContent='JPY / '+c.code;
    $('rateVal').textContent='1'+c.sym+' = '+nf(r,r>=1?2:4)+'円';
    $('dot').classList.toggle('warn',source==='warn');
    $('when').textContent=dateStr||'—';}
  function renderForeign(){var c=byCode[active];
    $('forFlag').textContent=c.flag;$('forIso').textContent=c.code;$('forName').textContent=cname(c);$('forSym').textContent=c.sym;
    $('jpyName').textContent=t('jpyName');}
  function renderQuick(){var c=byCode[active];$('qForH').textContent=c.code;
    var a=$('qJpy');a.innerHTML='';qJpy.forEach(function(v){var b=document.createElement('button');b.className='qb';b.textContent=nf(v,0);b.onclick=function(){side='jpy';raw=String(v);replaceNext=false;renderConv();};a.appendChild(b);});
    var d=$('qFor');d.innerHTML='';qFor.forEach(function(v){var b=document.createElement('button');b.className='qb';b.textContent=nf(v,0);b.onclick=function(){side='for';raw=String(v);replaceNext=false;renderConv();};d.appendChild(b);});}
  function renderSpark(){var c=byCode[active],h=(loadHist()[active]||[]),svg=$('spark'),e=$('sparkEmpty');
    $('sparkTitle').textContent=cname(c)+' · '+c.code;
    e.textContent=t('noHist');
    if(h.length<2){svg.innerHTML='';e.style.display='block';return;}
    e.style.display='none';
    var v=h.map(function(x){return x.r;}),mn=Math.min.apply(null,v),mx=Math.max.apply(null,v),rg=(mx-mn)||1;
    var W=300,H=40,p=3,n=v.length,col=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
    var pts=v.map(function(x,i){var X=n===1?W/2:p+i*(W-2*p)/(n-1);var Y=H-p-((x-mn)/rg)*(H-2*p);return X.toFixed(1)+','+Y.toFixed(1);});
    var l=pts[pts.length-1].split(',');
    svg.innerHTML='<polyline fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" points="'+pts.join(' ')+'"/><circle cx="'+l[0]+'" cy="'+l[1]+'" r="2.5" fill="'+col+'"/>';}
  function renderAll(){renderTabs();renderRate();renderForeign();renderQuick();renderConv();if($('sheet').classList.contains('show'))renderSpark();}

  function logAuto(){var h=loadHist(),d=dateStr||fmtDate(new Date());
    COUNTRIES.forEach(function(c){var a=h[c.code]||[],r=getRate(c.code),last=a[a.length-1];
      if(last&&last.d===d){last.r=r;}else{a.push({d:d,r:r,n:''});}
      if(a.length>90)a=a.slice(a.length-90);h[c.code]=a;});
    saveHist(h);}
  function recordNote(code){var c=byCode[code];var note=prompt(t('recPrompt'),'');if(note===null)return;
    var h=loadHist(),a=h[code]||[];a.push({d:fmtDate(new Date()),r:getRate(code),n:note});
    if(a.length>90)a=a.slice(a.length-90);h[code]=a;saveHist(h);
    if($('sheet').classList.contains('show')){renderHist();renderSpark();}
    toast(cname(c)+t('recDone'));}

  function renderEdit(){var g=$('egrid');g.innerHTML='';$('selCnt').textContent=displayed.length+'/4';
    var RM={'アジア':'regA','北米・欧州':'regE','オセアニア・その他':'regO'};
    var rs=[];COUNTRIES.forEach(function(c){if(rs.indexOf(c.rg)<0)rs.push(c.rg);});
    rs.forEach(function(rg){
      var h=document.createElement('div');h.className='rgh';h.textContent=t(RM[rg]||rg);g.appendChild(h);
      var gr=document.createElement('div');gr.className='rgg';
      COUNTRIES.filter(function(c){return c.rg===rg;}).forEach(function(c){
        var o=displayed.indexOf(c.code)+1;
        var el=document.createElement('button');el.className='ec'+(o>0?' on':'');
        el.innerHTML='<span class="f">'+c.flag+'</span><span class="n">'+cname(c)+'</span><span class="o">'+o+'</span>';
        el.onclick=function(){toggleCountry(c.code);};gr.appendChild(el);});
      g.appendChild(gr);});}
  function toggleCountry(code){var i=displayed.indexOf(code);
    if(i>=0){if(displayed.length<=1){toast(t('min1'));return;}displayed.splice(i,1);if(active===code){active=displayed[0];side='jpy';raw='';}}
    else{if(displayed.length>=4){toast(t('max4'));return;}displayed.push(code);}
    saveCfg();renderEdit();renderQEdit();renderAll();renderSpark();}
  function renderQEdit(){var c=byCode[active];$('qeForLbl').textContent=c.code;
    var a=$('qeJpy');a.innerHTML='';qJpy.forEach(function(v,i){var b=document.createElement('button');b.textContent=nf(v,0);b.onclick=function(){openDrum('jpy',i,v);};a.appendChild(b);});
    var d=$('qeFor');d.innerHTML='';qFor.forEach(function(v,i){var b=document.createElement('button');b.textContent=nf(v,0);b.onclick=function(){openDrum('for',i,v);};d.appendChild(b);});}
  function renderHist(){var h=loadHist(),box=$('histList');box.innerHTML='';
    COUNTRIES.forEach(function(c){var a=(h[c.code]||[]).slice().reverse(),lt=a[0];
      var card=document.createElement('div');card.className='cc'+(c.code===active?' open':'');
      var hd=document.createElement('div');hd.className='cch';
      hd.innerHTML='<span class="f">'+c.flag+'</span><div class="i"><b>'+cname(c)+'</b><small>'+c.name+' · '+c.code+'</small></div><div class="lt">'+(lt?(nf(lt.r,lt.r>=1?2:4)+'¥'):'—')+'<small>'+(a.length?(a.length+t('records')):t('noRec'))+'</small></div>';
      hd.onclick=function(){card.classList.toggle('open');};
      var bd=document.createElement('div');bd.className='ccb';var rows='';
      if(!a.length){rows='<div class="he">'+t('noHist')+'</div>';}
      else{a.forEach(function(e,i){var ri=(h[c.code].length-1)-i;
        rows+='<div class="hr"><span class="d">'+e.d+'</span><span class="v">'+nf(e.r,e.r>=1?2:4)+'¥</span>'+(e.n?('<span class="n">'+e.n.replace(/</g,'&lt;')+'</span>'):'<span style="flex:1"></span>')+'<button class="x" data-c="'+c.code+'" data-i="'+ri+'">✕</button></div>';});}
      bd.innerHTML=rows+'<div class="ra"><button class="r1" data-rec="'+c.code+'">'+t('rec')+'</button><button class="r2" data-clr="'+c.code+'">'+t('clear')+'</button></div>';
      card.appendChild(hd);card.appendChild(bd);box.appendChild(card);});
    box.querySelectorAll('.hr .x').forEach(function(b){b.onclick=function(e){e.stopPropagation();var c=b.getAttribute('data-c'),i=+b.getAttribute('data-i');var h2=loadHist();h2[c].splice(i,1);saveHist(h2);renderHist();renderSpark();};});
    box.querySelectorAll('[data-rec]').forEach(function(b){b.onclick=function(){recordNote(b.getAttribute('data-rec'));};});
    box.querySelectorAll('[data-clr]').forEach(function(b){b.onclick=function(){var c=b.getAttribute('data-clr');if(!confirm(cname(byCode[c])+t('clearQ')))return;var h2=loadHist();h2[c]=[];saveHist(h2);renderHist();renderSpark();};});}
  function openSheet(){closeKp();renderEdit();renderQEdit();renderHist();renderSpark();applyTheme();$('scrim').classList.add('show');$('sheet').classList.add('show');}
  function closeSheet(){$('scrim').classList.remove('show');$('sheet').classList.remove('show');}

  function openDrum(g,i,cur){drumTarget={g:g,i:i};var l=$('drumList');
    l.innerHTML='<div class="dp"></div>'+LADDER.map(function(v){return '<div class="di">'+nf(v,0)+'</div>';}).join('')+'<div class="dp"></div>';
    $('drumTitle').textContent=(g==='jpy'?'JPY':byCode[active].code)+t('amount');
    var ci=LADDER.indexOf(cur);if(ci<0)ci=0;
    $('drumScrim').classList.add('show');$('drum').classList.add('show');
    setTimeout(function(){l.scrollTop=ci*40;hlDrum();},40);}
  function hlDrum(){var l=$('drumList'),idx=Math.round(l.scrollTop/40);
    l.querySelectorAll('.di').forEach(function(it,i){it.classList.toggle('sel',i===idx);});}
  function drumVal(){var l=$('drumList'),i=Math.max(0,Math.min(LADDER.length-1,Math.round(l.scrollTop/40)));return LADDER[i];}
  function closeDrum(){$('drumScrim').classList.remove('show');$('drum').classList.remove('show');drumTarget=null;}
  function drumOk(){if(!drumTarget)return;var v=drumVal();
    if(drumTarget.g==='jpy')qJpy[drumTarget.i]=v;else qFor[drumTarget.i]=v;
    saveCfg();renderQuick();renderQEdit();closeDrum();}

  function save(){try{localStorage.setItem(KEY_RATE,JSON.stringify({day:todayKey(),rates:rates,dateStr:dateStr,source:source}));}catch(e){}}
  async function fetchRates(){var b=$('refBtn');b.classList.add('spin');var ok=false;
    try{var r=await fetch('https://open.er-api.com/v6/latest/JPY',{cache:'no-store'});var d=await r.json();
      if(d&&d.rates){COUNTRIES.forEach(function(c){if(d.rates[c.code])rates[c.code]=1/d.rates[c.code];});
        dateStr=d.time_last_update_utc?fmtDate(new Date(d.time_last_update_utc)):fmtDate(new Date());source='auto';ok=true;}}catch(e){}
    if(!ok){try{var cs=COUNTRIES.map(function(c){return c.code;}).join(',');
      var r2=await fetch('https://api.frankfurter.app/latest?from=JPY&to='+cs,{cache:'no-store'});var d2=await r2.json();
      if(d2&&d2.rates){COUNTRIES.forEach(function(c){if(d2.rates[c.code])rates[c.code]=1/d2.rates[c.code];});
        dateStr=d2.date?d2.date.slice(5).replace('-','/'):fmtDate(new Date());source='auto';ok=true;}}catch(e){}}
    if(ok){save();logAuto();}else{source='warn';}
    b.classList.remove('spin');renderRate();renderConv();return ok;}

  function init(){
    var cfg=null;try{cfg=JSON.parse(localStorage.getItem(KEY_CFG)||'null');}catch(e){}
    if(cfg){if(Array.isArray(cfg.displayed)&&cfg.displayed.length)displayed=cfg.displayed.filter(function(c){return byCode[c];}).slice(0,4);
      if(cfg.active&&byCode[cfg.active])active=cfg.active;if(cfg.theme)theme=cfg.theme;
      if(Array.isArray(cfg.qJpy)&&cfg.qJpy.length===3)qJpy=cfg.qJpy;
      if(Array.isArray(cfg.qFor)&&cfg.qFor.length===3)qFor=cfg.qFor;
      if(cfg.lang&&T[cfg.lang])lang=cfg.lang;}
    else{var nl=(navigator.language||'ja').slice(0,2);if(T[nl])lang=nl;}
    if(displayed.indexOf(active)<0)active=displayed[0];
    applyTheme();applyLang();
    var cached=null;try{cached=JSON.parse(localStorage.getItem(KEY_RATE)||'null');}catch(e){}
    if(cached&&cached.rates){rates=cached.rates;dateStr=cached.dateStr||null;source=cached.source||'cache';}
    renderAll();
    if(!cached||cached.day!==todayKey())fetchRates();

    $('rJpy').addEventListener('click',function(){focusSide('jpy');});
    $('rFor').addEventListener('click',function(){focusSide('for');});
    $('kpGrid').addEventListener('click',function(e){var b=e.target.closest('button');if(b)press(b.getAttribute('data-k'));});
    $('kpDone').addEventListener('click',closeKp);
    $('swapBtn').addEventListener('click',function(e){e.stopPropagation();var n=curNums();
      if(side==='for'){side='jpy';raw=seed(n.for,0);}else{side='for';raw=seed(n.jpy,byCode[active].dec);}
      replaceNext=true;renderConv();if(kpOpen)updateKp();});
    $('refBtn').addEventListener('click',fetchRates);
    $('recBtn').addEventListener('click',function(){recordNote(active);});
    $('myBtn').addEventListener('click',openSheet);
    $('closeBtn').addEventListener('click',closeSheet);
    $('scrim').addEventListener('click',closeSheet);
    document.querySelectorAll('#themeSeg button').forEach(function(b){b.addEventListener('click',function(){theme=b.getAttribute('data-th');saveCfg();applyTheme();renderSpark();});});
    $('wipeBtn').addEventListener('click',function(){if(!confirm(t('wipeQ')))return;saveHist({});renderHist();renderSpark();toast(t('wiped'));});
    var dl=$('drumList'),raf;dl.addEventListener('scroll',function(){if(raf)cancelAnimationFrame(raf);raf=requestAnimationFrame(hlDrum);});
    $('drumOk').addEventListener('click',drumOk);
    $('drumCancel').addEventListener('click',closeDrum);
    $('drumScrim').addEventListener('click',closeDrum);
    document.addEventListener('touchmove',function(e){
      if(e.target.closest('.sb')||e.target.closest('.dl'))return;e.preventDefault();},{passive:false});
  }
  init();
})();
</script>
</body>
</html>
