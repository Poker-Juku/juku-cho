<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Guitar Tuner – Juku-Cho</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="64x64" href="favicon-64.png">
<link rel="apple-touch-icon" sizes="192x192" href="apple-touch-icon.png">

<meta name="theme-color" content="#070d14">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;600;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #070d14;
  --panel:     #0a1220;
  --card:      #0d1828;
  --border:    #1a3050;
  --border-lt: #2a5080;
  --cyan:      #00c8f0;
  --cyan-dk:   #0080a8;
  --cyan-glow: #00e8ff;
  --gold:      #c8922a;
  --gold-lt:   #e8b84b;
  --gold-dk:   #8a5e10;
  --text:      #c8dff0;
  --text-dim:  #4a6888;
  --text-mid:  #8aafcc;
  --red:       #e05040;
  --grid:      rgba(0,150,200,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

/* スマホ: 全画面固定 */
@media (max-width: 767px) {
  html, body {
    height:100%; width:100%;
    overflow:hidden; touch-action:none;
    overscroll-behavior:none; position:fixed;
  }
  body {
    display:flex; flex-direction:column;
    align-items:stretch; justify-content:flex-start;
    font-family:'Exo 2', sans-serif; color:var(--text);
    background:var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,80,140,0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(0,40,80,0.2) 0%, transparent 60%);
  }
  .app {
    width:100%; flex:1;
    display:flex; flex-direction:column;
    overflow:hidden; touch-action:manipulation; position:relative;
    background:linear-gradient(175deg,#0d1828 0%,#070d14 50%,#0a1220 100%);
  }
}

/* PC: 2:3カード表示 */
@media (min-width: 768px) {
  html, body {
    height:100%; width:100%; margin:0;
    font-family:'Exo 2', sans-serif; color:var(--text);
    background:var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,80,140,0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(0,40,80,0.2) 0%, transparent 60%);
  }
  body {
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:24px 0;
  }
  .app {
    width:420px; height:630px;
    display:flex; flex-direction:column;
    overflow:hidden; touch-action:manipulation; position:relative;
    background:linear-gradient(175deg,#0d1828 0%,#070d14 50%,#0a1220 100%);
    border-radius:12px; border:1px solid var(--border-lt);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.8),
      0 20px 60px rgba(0,0,0,0.8),
      0 0 40px rgba(0,150,200,0.08),
      inset 0 1px 0 rgba(0,200,240,0.1);
    flex-shrink:0;
  }
}

/* ═══ HEADER ═══ */
.header {
  display:flex; align-items:center;
  padding:8px 14px 8px 12px; gap:10px;
  background:linear-gradient(180deg,#0d1828 0%,#070d14 100%);
  border-bottom:1px solid var(--border);
  position:relative; flex-shrink:0; overflow:hidden;
}
.header::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at 60% 50%,rgba(0,80,140,0.18) 0%,transparent 70%);
  pointer-events:none;
}
.header::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan-dk) 30%,var(--cyan) 50%,var(--cyan-dk) 70%,transparent);
}
.logo {
  width:58px; height:58px; flex-shrink:0; border-radius:50%;
  border:1px solid var(--cyan-dk);
  box-shadow:0 0 12px rgba(0,200,240,0.3),0 0 24px rgba(0,200,240,0.1);
  overflow:hidden;
}
.logo img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.title-block { flex:1; }
.title-main { font-family:'Orbitron',sans-serif; font-weight:900; line-height:1; letter-spacing:3px; }
.title-main .t-guitar { font-size:26px; color:#ffffff; text-shadow:0 0 20px rgba(255,255,255,0.4); display:block; }
.title-main .t-tuner {
  font-size:26px;
  background:linear-gradient(90deg,var(--cyan-glow),var(--cyan));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 8px rgba(0,200,240,0.7)); display:block;
}
.title-sub { font-family:'Exo 2',sans-serif; font-size:8px; letter-spacing:4px; color:var(--text-dim); margin-top:4px; }

/* switch removed */

/* 右コントロール */
.header-controls { display:flex; flex-direction:column; gap:3px; align-items:flex-end; }
.tone-group { display:flex; flex-direction:column; gap:2px; }
.tone-btn {
  background:rgba(0,0,0,0.4); border:1px solid var(--border); border-radius:2px;
  color:var(--text-dim); font-family:'Exo 2',sans-serif; font-size:10px; font-weight:600;
  letter-spacing:2px; padding:3px 10px; cursor:pointer; transition:all 0.15s;
  min-width:90px; text-align:center;
}
.tone-btn:hover { border-color:var(--cyan-dk); color:var(--text); }
.tone-btn.active {
  border-color:var(--cyan); color:var(--cyan);
  background:rgba(0,200,240,0.08); box-shadow:0 0 8px rgba(0,200,240,0.2);
}
.tone-dot { display:none; }
.wave-group { display:flex; gap:4px; margin-top:2px; }
.wave-btn {
  background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:2px;
  color:var(--text-dim); font-family:'Exo 2',sans-serif;
  font-size:9px; font-weight:600; letter-spacing:1.5px;
  padding:3px 8px; cursor:pointer; transition:all 0.15s;
}
.wave-btn:hover { border-color:var(--cyan-dk); color:var(--text); }
.wave-btn.active {
  border-color:var(--cyan); color:var(--cyan);
  background:rgba(0,200,240,0.1); box-shadow:0 0 6px rgba(0,200,240,0.25);
}

/* ═══ TUNING BAR ═══ */
.tuning-bar {
  display:flex; align-items:center; padding:7px 14px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.2); flex-shrink:0;
}
.tuning-select-wrap { position:relative; flex:1; }
.tuning-select {
  width:100%;
  background:linear-gradient(180deg,#0d1828,#070d14);
  border:1px solid var(--border-lt); border-radius:4px;
  color:var(--text); font-family:'Exo 2',sans-serif;
  font-size:13px; font-weight:600; letter-spacing:2px;
  cursor:pointer; outline:none; appearance:none; -webkit-appearance:none;
  padding:7px 36px 7px 12px; transition:border-color 0.15s,box-shadow 0.15s;
}
.tuning-select option { background:#0a1220; color:var(--text); }
.tuning-select:hover { border-color:var(--cyan); box-shadow:0 0 8px rgba(0,200,240,0.2); }
.tuning-arrow {
  position:absolute; right:10px; top:50%; transform:translateY(-50%);
  color:var(--cyan); font-size:13px; pointer-events:none; line-height:1;
}

/* ═══ NECK / GRID AREA ═══ */
.neck-wrap {
  margin:6px 10px;
  background:linear-gradient(180deg,#060c14 0%,#0a1220 100%);
  border:1px solid var(--border); border-radius:4px;
  padding:4px 8px; position:relative; overflow:hidden;
  flex:1; display:flex; flex-direction:column; min-height:0;
}
.neck-wrap::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(90deg,
    transparent, transparent calc(20% - 1px),
    var(--grid) calc(20% - 1px), var(--grid) 20%);
  pointer-events:none;
}
.neck-nut {
  position:absolute; left:0; top:0; bottom:0; width:3px;
  background:linear-gradient(180deg,var(--cyan-glow),var(--cyan),var(--cyan-glow));
  box-shadow:0 0 8px rgba(0,200,240,0.7); border-radius:0 2px 2px 0;
}
.cent-labels {
  position:absolute; left:6px; top:0; bottom:0;
  display:flex; flex-direction:column;
  justify-content:space-between; padding:4px 0; pointer-events:none;
}
.cent-label {
  font-family:'Exo 2',sans-serif; font-size:8px;
  color:var(--text-dim); letter-spacing:1px; line-height:1;
}
.cent-label.zero {
  color:var(--cyan); font-weight:600;
  display:flex; align-items:center; gap:2px;
}
.cent-label.zero::after {
  content:'▶'; font-size:6px; color:var(--cyan);
  filter:drop-shadow(0 0 3px rgba(0,200,240,0.8));
}
.zero-line {
  position:absolute; left:0; right:0; height:1px;
  background:rgba(0,200,240,0.25); top:50%; pointer-events:none;
}

#stringsArea {
  display:flex; flex-direction:column;
  flex:1; min-height:0; overflow:hidden;
}

.string-row {
  display:flex; align-items:center;
  flex:1; position:relative; padding-left:30px; min-height:0; max-height:80px;
}
.string-wire {
  flex:1; position:relative; display:flex; align-items:center;
}
.string-wire::before {
  content:''; position:absolute; left:0; right:0; border-radius:1px;
  background:linear-gradient(90deg,var(--gold-dk),var(--gold-lt) 30%,var(--gold) 70%,var(--gold-dk));
  box-shadow:0 0 4px rgba(200,146,42,0.4),0 0 1px rgba(255,200,80,0.6);
}
.string-row.s6 .string-wire::before { height:4px; }
.string-row.s5 .string-wire::before { height:3.5px; }
.string-row.s4 .string-wire::before { height:3px; }
.string-row.s3 .string-wire::before { height:2px; }
.string-row.s2 .string-wire::before { height:1.5px; }
.string-row.s1 .string-wire::before { height:1px; }
.fret-line {
  position:absolute; top:-20px; bottom:-20px; width:1px;
  background:rgba(0,100,160,0.2);
}
.string-btn {
  width:80px; height:58px; flex-shrink:0;
  background:linear-gradient(180deg,#0d1828,#070d14);
  border:1px solid var(--border-lt); border-radius:4px;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
  transition:all 0.1s; position:relative; z-index:2; margin-left:6px;
}
.string-btn:hover {
  border-color:var(--cyan); box-shadow:0 0 10px rgba(0,200,240,0.3);
  background:linear-gradient(180deg,#0d2038,#071020);
}
.string-btn.playing {
  border-color:var(--cyan-glow); box-shadow:0 0 14px rgba(0,200,240,0.6);
  background:linear-gradient(180deg,#0a2840,#050f1a);
}
.btn-note {
  font-family:'Orbitron',sans-serif; font-size:22px; font-weight:700;
  color:#ffffff; line-height:1;
}
.btn-num {
  font-family:'Exo 2',sans-serif; font-size:8px;
  color:var(--cyan); letter-spacing:0.5px;
}

/* 弦の振動アニメーション */
@keyframes stringVibrate {
  0%   { transform:scaleY(1)   translateY(0px); }
  15%  { transform:scaleY(4)   translateY(-1px); }
  30%  { transform:scaleY(2.5) translateY(1px); }
  45%  { transform:scaleY(3)   translateY(-0.7px); }
  60%  { transform:scaleY(2)   translateY(0.5px); }
  75%  { transform:scaleY(1.5) translateY(-0.3px); }
  90%  { transform:scaleY(1.2) translateY(0.1px); }
  100% { transform:scaleY(1)   translateY(0px); }
}
.string-wire.vibrating::before {
  animation:stringVibrate 0.08s ease-in-out infinite;
  transform-origin:center;
  filter:drop-shadow(0 0 3px rgba(200,180,80,0.9));
}

/* ═══ AD BANNER ═══ */
.ad-banner {
  width:100%; height:52px;
  background:#050a10;
  border-top:1px solid var(--border); border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; flex-shrink:0; position:relative;
}
.ad-banner-inner {
  font-family:'Exo 2',sans-serif; font-size:9px;
  letter-spacing:4px; color:var(--text-dim);
}

/* ═══ BOTTOM BUTTONS ═══ */
.bottom-row {
  display:flex; gap:5px; padding:6px 10px 7px;
  flex-shrink:0; align-items:stretch;
}
.chord-group {
  flex:1; display:flex; flex-direction:column; gap:4px;
}
.chord-btn {
  flex:1;
  background:linear-gradient(180deg,#0d1828,#070d14);
  border:1px solid var(--border-lt); border-radius:4px;
  color:var(--text-mid); cursor:pointer;
  padding:4px 6px; transition:all 0.15s; text-align:center;
}
.chord-btn:hover { border-color:var(--cyan-dk); color:var(--text); background:#0d2030; }
.chord-btn.playing { border-color:var(--cyan); box-shadow:0 0 8px rgba(0,200,240,0.25); }
.chord-label {
  font-family:'Orbitron',sans-serif; font-size:9px; font-weight:700;
  letter-spacing:1px; color:#ffffff;
}
.chord-notes {
  font-family:'Exo 2',sans-serif; font-size:7px;
  color:var(--text-dim); letter-spacing:0.5px; margin-top:1px;
}
.all-strings-btn {
  flex:1;
  background:linear-gradient(180deg,#0a2040,#050f20);
  border:2px solid var(--cyan); border-radius:4px;
  color:var(--cyan); cursor:pointer;
  padding:4px 6px; transition:all 0.15s; text-align:center;
  box-shadow:0 0 10px rgba(0,200,240,0.2);
}
.all-strings-btn:hover {
  box-shadow:0 0 16px rgba(0,200,240,0.4);
  background:linear-gradient(180deg,#0d2848,#071428);
}
.all-strings-btn.playing {
  box-shadow:0 0 20px rgba(0,200,240,0.6); border-color:var(--cyan-glow);
}
.all-label {
  font-family:'Orbitron',sans-serif; font-size:10px; font-weight:700;
  letter-spacing:2px; color:#ffffff;
}
.all-sub {
  font-size:7px; font-family:'Exo 2',sans-serif;
  color:var(--cyan); letter-spacing:1.5px; margin-top:1px;
}
.stop-btn {
  width:130px; flex-shrink:0;
  background:linear-gradient(180deg,#1a0a0a,#0e0505);
  border:2px solid #703030; border-radius:6px;
  cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
  transition:all 0.15s;
}
.stop-btn:hover {
  border-color:var(--red); box-shadow:0 0 14px rgba(224,80,64,0.4);
  background:linear-gradient(180deg,#220d0d,#110606);
}
.stop-icon {
  width:40px; height:40px; background:var(--red); border-radius:4px;
  box-shadow:0 0 8px rgba(224,80,64,0.5);
}
.stop-label {
  font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700;
  letter-spacing:2px; color:var(--red);
}

/* ═══ FOOTER ═══ */
.footer {
  display:flex; justify-content:center; align-items:center;
  padding:4px 14px 6px;
  border-top:1px solid var(--border); flex-shrink:0;
}
.footer-right {
  font-family:'Exo 2',sans-serif; font-size:9px;
  letter-spacing:4px; color:var(--text-dim);
}
</style>
</head>

    <div class="title-block">
      <div class="title-main">
        <span class="t-guitar">GUITAR</span>
        <span class="t-tuner" id="titleTuner">TUNER</span>
      </div>
      <div class="title-sub">· An ultra-lightweight tuner ·</div>
    </div>

    <div class="header-controls">
      <div class="tone-group">
        <button class="tone-btn active" onclick="setTone('electric',this)">ELECTRIC</button>
        <button class="tone-btn" onclick="setTone('acoustic',this)">ACOUSTIC</button>
      </div>
      <div class="wave-group">
        <button class="wave-btn active" onclick="setWave('fade',this)">FADE</button>
        <button class="wave-btn" onclick="setWave('sustain',this)">SUSTAIN</button>
      </div>
    </div>
  </div>

  <!-- TUNING BAR -->
  <div class="tuning-bar">
    <div class="tuning-select-wrap">
      <select class="tuning-select" id="tuningSelect" onchange="onTuningChange()">
        <option value="standard">STANDARD — E A D G B E</option>
        <option value="halfdown">HALF DOWN — Eb Ab Db Gb Bb Eb</option>
        <option value="fulldown">FULL DOWN — D G C F A D</option>
        <option value="dropd">DROP D — D A D G B E</option>
      </select>

    </div>
  </div>

  <!-- NECK / GRID -->
  <div class="neck-wrap">

      <div class="cent-label">-25</div>

  <!-- BOTTOM BUTTONS -->
  <div class="bottom-row">
    <div class="chord-group">
      <button class="chord-btn" id="btnCodeE" onclick="playChord('codeE',this)">
        <div class="chord-label">CODE : E</div>
        <div class="chord-notes">E B E G# B E</div>
      </button>
      <button class="chord-btn" id="btnCodeA" onclick="playChord('codeA',this)">
        <div class="chord-label">CODE : A</div>
        <div class="chord-notes">A E A C# E A</div>
      </button>
      <button class="all-strings-btn" id="btnAll" onclick="playAllStrings(this)">
        <div class="all-label">ALL STRINGS</div>
        <div class="all-sub">STRUM ALL</div>
      </button>

      <div class="stop-icon"></div>

<script>
// ── TUNING DATA ──
const GUITAR_TUNINGS = {
  standard: { name:'STANDARD', notes:['E','A','D','G','B','E'], freqs:[82.41,110.00,146.83,196.00,246.94,329.63] },
  halfdown: { name:'HALF DOWN', notes:['Eb','Ab','Db','Gb','Bb','Eb'], freqs:[77.78,103.83,138.59,185.00,233.08,311.13] },
  fulldown: { name:'FULL DOWN', notes:['D','G','C','F','A','D'], freqs:[73.42,98.00,130.81,174.61,220.00,293.66] },
  dropd:    { name:'DROP D',    notes:['D','A','D','G','B','E'], freqs:[73.42,110.00,146.83,196.00,246.94,329.63] },
};
const CHORD_FREQS = {
  codeE: [82.41,246.94,82.41,103.83,246.94,82.41].map(f=>f*4),
  codeA: [110.00,329.63,110.00,138.59,329.63,110.00].map(f=>f*4),
};

const TUNINGS = GUITAR_TUNINGS;
let curKey   = 'standard';
let toneType = 'electric';
let waveMode = 'fade';
let allOscs  = [];
let allGains = [];
let visSpans = [];
let visAnim;

const AC = () => {
  if (!window._ac) window._ac = new (window.AudioContext||window.webkitAudioContext)();
  return window._ac;
};

function getToneParams() {
  if (toneType === 'electric') return { type:'sawtooth', attack:0.01, decay:0.3 };
  if (toneType === 'acoustic') return { type:'triangle', attack:0.005, decay:0.6 };
  return { type:'sine', attack:0.02, decay:0.1 };
}

function setTone(t, el) {
  toneType = t;
  document.querySelectorAll('.tone-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
function setWave(w, el) {
  waveMode = w;
  document.querySelectorAll('.wave-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function playFreq(freq, startTime, dur) {
  const ac   = AC();
  const osc  = ac.createOscillator();
  const gain = ac.createGain();
  const p    = getToneParams();
  osc.type = p.type;
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(ac.destination);
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(0.4, startTime + p.attack);
  if (waveMode === 'fade') {
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + p.attack + dur);
  } else {
    gain.gain.setValueAtTime(0.4, startTime + p.attack + dur - 0.2);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + p.attack + dur);
  }
  if (toneType === 'electric') {
    const osc2 = ac.createOscillator();
    const g2   = ac.createGain();
    osc2.type = 'square';
    osc2.frequency.value = freq;
    g2.gain.value = 0.05;
    osc2.connect(g2); g2.connect(gain);
    osc2.start(startTime); osc2.stop(startTime + p.attack + dur + 0.1);
    allOscs.push(osc2); allGains.push(g2);
  }
  osc.start(startTime);
  osc.stop(startTime + p.attack + dur + 0.1);
  allOscs.push(osc); allGains.push(gain);
}

function stopAll() {
  allOscs.forEach(o => { try { o.stop(); } catch(e){} });
  allGains.forEach(g => { try { g.gain.cancelScheduledValues(0); g.gain.setValueAtTime(0,0); } catch(e){} });
  allOscs=[]; allGains=[];
  document.querySelectorAll('.string-btn').forEach(b=>b.classList.remove('playing'));
  document.querySelectorAll('.chord-btn,.all-strings-btn').forEach(b=>b.classList.remove('playing'));
  document.querySelectorAll('.string-wire').forEach(w=>w.classList.remove('vibrating'));
  stopVis();
}

function playString(idx, btn) {
  stopAll();
  const t   = TUNINGS[curKey];
  const dur = waveMode === 'sustain' ? 14 : 8;
  const wire = btn.closest('.string-row')?.querySelector('.string-wire');
  if (wire) {
    wire.classList.add('vibrating');
    setTimeout(() => wire.classList.remove('vibrating'), (dur + 0.5) * 1000);
  }
  playFreq(t.freqs[idx] * 4, AC().currentTime, dur);
  btn.classList.add('playing');
  setTimeout(() => btn.classList.remove('playing'), (dur + 0.5) * 1000);
  startVis();
}

function playAllStrings(btn) {
  stopAll();
  const ac  = AC();
  const t   = TUNINGS[curKey];
  const dur = waveMode === 'sustain' ? 12 : 7;
  const wires = document.querySelectorAll('.string-wire');
  wires.forEach((wire, i) => {
    setTimeout(() => {
      wire.classList.add('vibrating');
      setTimeout(() => wire.classList.remove('vibrating'), (dur + 0.5) * 1000);
    }, i * 120);
  });
  t.freqs.forEach((f, i) => playFreq(f * 4, ac.currentTime + i * 0.12, dur));
  btn.classList.add('playing');
  setTimeout(() => btn.classList.remove('playing'), (dur + t.freqs.length * 0.12 + 0.5) * 1000);
  startVis();
}

function playChord(type, btn) {
  if (type === 'none') { stopAll(); return; }
  stopAll();
  const ac   = AC();
  const dur  = waveMode === 'sustain' ? 12 : 7;
  const freqs = CHORD_FREQS[type];
  freqs.forEach((f, i) => playFreq(f, ac.currentTime + i * 0.08, dur));
  btn.classList.add('playing');
  setTimeout(() => btn.classList.remove('playing'), (dur + freqs.length * 0.08 + 0.5) * 1000);
  startVis();
}

function startVis() {
  stopVis();
  visAnim = setInterval(() => {
    visSpans.forEach(s => {
      const h = Math.random() * 12 + 2;
      s.style.height = h + 'px';
      s.style.background = h > 9 ? 'var(--cyan-glow)' : h > 5 ? 'var(--cyan)' : 'var(--cyan-dk)';
    });
  }, 60);
}
function stopVis() {
  clearInterval(visAnim);
  visSpans.forEach(s => { s.style.height = '2px'; s.style.background = 'var(--cyan-dk)'; });
}

function buildStrings() {
  const area = document.getElementById('stringsArea');
  area.innerHTML = '';
  const t = TUNINGS[curKey];
  const ordinals = ['','1st','2nd','3rd','4th','5th','6th'];
  const frets = [20,36,52,68,84];
  const numStrings = t.notes.length;
  for (let i = 0; i < numStrings; i++) {
    const strNum = numStrings - i;
    const row = document.createElement('div');
    row.className = 'string-row s' + strNum;
    const wire = document.createElement('div');
    wire.className = 'string-wire';
    frets.forEach(p => {
      const fl = document.createElement('div');
      fl.className = 'fret-line';
      fl.style.left = p + '%';
      wire.appendChild(fl);
    });
    const btn = document.createElement('button');
    btn.className = 'string-btn';
    const ne = document.createElement('div'); ne.className = 'btn-note'; ne.textContent = t.notes[i];
    const nu = document.createElement('div'); nu.className = 'btn-num';  nu.textContent = ordinals[strNum];
    btn.appendChild(ne); btn.appendChild(nu);
    btn.onclick = () => playString(i, btn);
    row.appendChild(wire);
    row.appendChild(btn);
    area.appendChild(row);
  }
}

function onTuningChange() {
  curKey = document.getElementById('tuningSelect').value;
  buildStrings();
}
