<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Pot Tracker | Juku-Cho Poker</title>
<style>
  :root{
    --bg:#0f1e14;
    --text:#e2d9c5;
    --gold:#c9a84c;
    --gold-dim:rgba(201,168,76,0.55);
    --pot:#f0d060;
    --pot-flash:#ffe680;
    --green:#4ade80;
    --green-dark:#86efac;
    --red:#f87171;
    --blue:#93c5fd;
    --purple:#e879f9;
    --yellow:#fbbf24;
    --pink:#f9a8d4;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;width:100%;height:100%;
    background:var(--bg);color:var(--text);
    font-family:'Hiragino Sans','Trebuchet MS',sans-serif;
    overflow:hidden;
    -webkit-user-select:none;user-select:none;
  }
  #app{width:100vw;height:100vh;display:flex;flex-direction:column;}

  /* ‚îÄ‚îÄ Top bar ‚îÄ‚îÄ */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:7px 18px;border-bottom:1px solid rgba(180,150,60,0.25);
    background:rgba(0,0,0,0.35);flex-shrink:0;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .suit{font-size:18px;opacity:0.8;}
  .brand .name{font-size:14px;font-weight:bold;letter-spacing:3px;color:var(--gold);}
  .topbtns{display:flex;gap:8px;}
  .topbtn{
    border-radius:8px;padding:6px 13px;cursor:pointer;font-size:13px;border:1px solid;
    background:transparent;font-family:inherit;
  }
  .topbtn.gold{color:var(--gold);border-color:rgba(201,168,76,0.55);background:rgba(201,168,76,0.1);}
  .topbtn.red{color:var(--red);border-color:rgba(248,113,113,0.55);background:rgba(248,113,113,0.1);}

  /* ‚îÄ‚îÄ Main grid ‚îÄ‚îÄ */
  .maingrid{flex:1;display:grid;grid-template-columns:1fr 1.15fr 1fr;overflow:hidden;}
  .col{padding:10px 14px;overflow:hidden;}
  .col.left{display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid rgba(180,150,60,0.15);}
  .col.center{display:flex;flex-direction:column;justify-content:center;padding:10px 18px;border-right:1px solid rgba(180,150,60,0.15);}
  .col.right{display:flex;flex-direction:column;}

  /* ‚îÄ‚îÄ Players selector ‚îÄ‚îÄ */
  .players-btn{
    background:rgba(147,197,253,0.12);border:1px solid rgba(147,197,253,0.35);
    color:var(--blue);border-radius:10px;padding:6px 18px;cursor:pointer;
    font-size:13px;font-weight:bold;margin-bottom:10px;display:flex;align-items:center;gap:6px;
    font-family:inherit;
  }

  /* ‚îÄ‚îÄ Pot display ‚îÄ‚îÄ */
  .pot-label{font-size:10px;letter-spacing:4px;color:var(--gold-dim);margin-bottom:4px;}
  .pot-value{
    font-size:62px;font-weight:900;line-height:1;color:var(--pot);
    text-shadow:0 0 16px rgba(240,208,80,0.25);
    transition:all 0.4s ease;font-variant-numeric:tabular-nums;letter-spacing:-2px;
  }
  .pot-value.flash{color:var(--pot-flash);text-shadow:0 0 40px rgba(255,230,80,0.9);}
  .blind-chips{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;justify-content:center;}
  .blind-chip{background:rgba(255,255,255,0.06);border-radius:7px;padding:4px 10px;font-size:12px;border:1px solid;}
  .blind-chip .lbl{opacity:0.65;font-size:10px;}
  .action-btns{display:flex;gap:8px;margin-top:14px;}
  .action-btn{
    border-radius:12px;padding:11px 18px;cursor:pointer;font-size:15px;font-weight:bold;
    border:1.5px solid;font-family:inherit;
  }
  .action-btn.bet{background:linear-gradient(135deg,#1c4a30,#0e2e1c);border-color:var(--green);color:var(--green);}
  .action-btn.reraise{background:linear-gradient(135deg,#4a1c1c,#2e0e0e);border-color:var(--red);color:var(--red);}

  /* ‚îÄ‚îÄ Pot bet sizes ‚îÄ‚îÄ */
  .pbs-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .pbs-title{font-size:10px;letter-spacing:4px;color:var(--gold-dim);}
  .custom-pct-btn{
    border-radius:7px;padding:5px 11px;cursor:pointer;font-size:12px;border:1px solid;
    background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.45);border-color:rgba(255,255,255,0.15);
    font-family:inherit;
  }
  .custom-pct-btn.active{background:rgba(232,121,249,0.18);border-color:var(--purple);color:var(--purple);}
  .pct-list{display:flex;flex-direction:column;gap:7px;}
  .pct-row{
    display:flex;align-items:center;justify-content:space-between;
    background:rgba(255,255,255,0.04);border:1px solid;border-radius:11px;padding:8px 14px;
  }
  .pct-row.custom{background:rgba(232,121,249,0.05);}
  .pct-left{display:flex;align-items:center;gap:10px;}
  .pct-circle{
    width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:bold;flex-shrink:0;border:2px solid;
  }
  .pct-bar-wrap{width:80px;height:5px;border-radius:3px;background:rgba(255,255,255,0.08);overflow:hidden;}
  .pct-bar{height:100%;border-radius:3px;transition:width 0.4s;}
  .pct-amount{font-size:26px;font-weight:bold;font-variant-numeric:tabular-nums;letter-spacing:-0.5px;}

  /* ‚îÄ‚îÄ History ‚îÄ‚îÄ */
  .hist-title{font-size:10px;letter-spacing:4px;color:var(--gold-dim);margin-bottom:8px;}
  .hist-empty{flex:1;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.18);font-size:13px;}
  .hist-list{flex:1;overflow-y:auto;}
  .hist-row{
    padding:7px 10px;margin-bottom:5px;background:rgba(255,255,255,0.04);border-radius:10px;
    border:1px solid;display:flex;justify-content:space-between;align-items:center;
  }
  .hist-row .lbl{font-size:12px;}
  .hist-row .amt{font-size:16px;font-weight:bold;color:var(--pot);font-variant-numeric:tabular-nums;}
  .hist-total{
    border-top:1px solid rgba(201,168,76,0.2);padding-top:7px;margin-top:4px;
    display:flex;justify-content:space-between;font-size:13px;
  }
  .hist-total .lbl{color:rgba(255,255,255,0.35);}
  .hist-total .amt{color:var(--pot);font-weight:bold;}

  /* ‚îÄ‚îÄ Modal ‚îÄ‚îÄ */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:50;
    display:flex;align-items:center;justify-content:center;
  }
  .modal-box{
    background:#131d16;border:1px solid rgba(201,168,76,0.3);border-radius:20px;
    padding:22px 24px;max-width:92vw;max-height:92vh;overflow-y:auto;
  }
  .modal-title{font-size:11px;letter-spacing:4px;margin-bottom:16px;}

  /* ‚îÄ‚îÄ NumPad ‚îÄ‚îÄ */
  .numpad-display{
    background:rgba(0,0,0,0.45);border:1px solid;border-radius:10px;padding:8px 14px;
    text-align:right;font-weight:900;display:flex;align-items:center;justify-content:flex-end;
    font-variant-numeric:tabular-nums;margin-bottom:8px;
  }
  .numpad-display.large{font-size:38px;min-height:60px;}
  .numpad-display.small{font-size:30px;min-height:50px;}
  .numpad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
  .numpad-key{
    border-radius:9px;cursor:pointer;border:none;font-weight:bold;font-family:inherit;
    background:rgba(255,255,255,0.07);color:var(--text);
  }
  .numpad-key.large{padding:13px 0;font-size:20px;}
  .numpad-key.small{padding:11px 0;font-size:17px;}
  .numpad-key.clear{background:rgba(248,113,113,0.16);color:var(--red);}
  .numpad-key.del{background:rgba(255,255,255,0.08);color:var(--yellow);}

  /* ‚îÄ‚îÄ Blind settings ‚îÄ‚îÄ */
  .field-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
  .field-tab{
    padding:10px 0;border-radius:11px;cursor:pointer;display:flex;flex-direction:column;
    align-items:center;gap:4px;border:2px solid;background:rgba(255,255,255,0.04);
  }
  .field-tab .flbl{font-size:11px;letter-spacing:1px;color:rgba(255,255,255,0.35);}
  .field-tab .fval{font-size:26px;font-weight:900;color:rgba(255,255,255,0.55);font-variant-numeric:tabular-nums;}
  .field-tab.active .flbl,.field-tab.active .fval{filter:none;}

  .mem-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .mem-card{background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.18);border-radius:12px;padding:10px 12px;}
  .mem-title{font-size:10px;letter-spacing:2px;color:rgba(201,168,76,0.5);margin-bottom:8px;}
  .mem-vals{font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:8px;line-height:2;}
  .mem-empty{font-size:12px;color:rgba(255,255,255,0.2);margin-bottom:8px;}
  .mem-actions{display:flex;gap:6px;}
  .mem-btn{flex:1;padding:7px 0;font-size:12px;border-radius:8px;cursor:pointer;border:1px solid;font-family:inherit;}
  .mem-btn.save{background:rgba(201,168,76,0.12);border-color:rgba(201,168,76,0.35);color:var(--gold);}
  .mem-btn.load{background:rgba(147,197,253,0.12);border-color:rgba(147,197,253,0.4);color:var(--blue);}
  .mem-btn.disabled{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.2);cursor:not-allowed;}

  .modal-2col{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .modal-btn{
    border-radius:10px;padding:12px 0;cursor:pointer;font-size:14px;border:1px solid;font-family:inherit;
  }
  .modal-btn.cancel{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.35);}
  .modal-btn.confirm{font-weight:bold;font-size:15px;}
  .modal-btn.disabled{cursor:not-allowed;opacity:0.4;}

  /* ‚îÄ‚îÄ Players modal ‚îÄ‚îÄ */
  .players-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .players-num{
    padding:18px 0;font-size:24px;font-weight:900;border-radius:12px;cursor:pointer;border:2px solid;
    background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.55);font-family:inherit;
  }
  .players-num.active{background:rgba(147,197,253,0.25);border-color:var(--blue);color:var(--blue);}

  /* ‚îÄ‚îÄ Custom pct presets ‚îÄ‚îÄ */
  .preset-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px;}
  .preset-btn{
    padding:9px 0;font-size:14px;font-weight:bold;border-radius:9px;cursor:pointer;border:1.5px solid;
    background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);font-family:inherit;
  }
  .preset-btn.active{background:rgba(232,121,249,0.22);border-color:var(--purple);color:var(--purple);}

  /* ‚îÄ‚îÄ Bet modal ‚îÄ‚îÄ */
  .bet-modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:580px;}
  .callers-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .caller-btn{
    padding:12px 0;font-size:18px;font-weight:bold;border-radius:10px;cursor:pointer;border:1.5px solid;
    background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.45);font-family:inherit;
  }
  .caller-btn.active{background:rgba(74,222,128,0.22);border-color:var(--green);color:var(--green);}
  .preview-box{border-radius:10px;padding:10px 14px;margin-top:14px;text-align:center;border:1px solid;}
  .preview-label{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:3px;}
  .preview-amt{font-size:30px;font-weight:900;font-variant-numeric:tabular-nums;}

  .loading{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:14px;letter-spacing:2px;}
</style>
</head>
<body>
<div id="app"><div class="loading">Ë™≠„ÅøËæº„Åø‰∏≠...</div></div>

<script>
(function(){
  "use strict";

  var PCT_LABELS = [20,30,35,50,70];
  var PCT_COLORS = ["#5eead4","#67e8f9","#a5f3fc","#7dd3fc","#93c5fd"];
  var DEFAULTS = { sb:10, bb:20, ante:0, numPlayers:6 };
  var PRESET_PCTS = [25,33,60,66,75,100,125,150];

  var state = {
    sb: DEFAULTS.sb, bb: DEFAULTS.bb, ante: DEFAULTS.ante, numPlayers: DEFAULTS.numPlayers,
    pot: DEFAULTS.sb + DEFAULTS.bb + DEFAULTS.ante,
    betHistory: [],
    customPct: 0,
    mem: [null, null],
    flash: false,
    ui: { showBlind:false, showPlayers:false, showBet:false, showReraise:false, showCustomPct:false },
    blindModal: { editing:'sb', vals:{sb:DEFAULTS.sb,bb:DEFAULTS.bb,ante:DEFAULTS.ante}, input:String(DEFAULTS.sb) },
    betModal: { amount:'', callers:'' },
    reraiseModal: { amount:'' },
    customPctModal: { input:'' },
  };

  function fmt(n){ return Number(n||0).toLocaleString('ja-JP'); }

  // ‚îÄ‚îÄ Persistence (localStorage ‚Äî works on GitHub Pages) ‚îÄ‚îÄ
  function loadPersisted(){
    try{
      var raw = localStorage.getItem('pokerLastSettings');
      if(raw){
        var s = JSON.parse(raw);
        state.sb = s.sb ?? DEFAULTS.sb;
        state.bb = s.bb ?? DEFAULTS.bb;
        state.ante = s.ante ?? DEFAULTS.ante;
        state.numPlayers = s.numPlayers ?? DEFAULTS.numPlayers;
        state.pot = state.sb + state.bb + state.ante;
      }
    }catch(e){}
    try{
      var rawMem = localStorage.getItem('pokerBlindMemory');
      if(rawMem) state.mem = JSON.parse(rawMem);
    }catch(e){}
  }
  function persistSettings(){
    try{
      localStorage.setItem('pokerLastSettings', JSON.stringify({
        sb:state.sb, bb:state.bb, ante:state.ante, numPlayers:state.numPlayers
      }));
    }catch(e){}
  }
  function persistMemory(){
    try{ localStorage.setItem('pokerBlindMemory', JSON.stringify(state.mem)); }catch(e){}
  }

  // ‚îÄ‚îÄ Actions ‚îÄ‚îÄ
  var App = {};

  App.openBlind = function(){
    state.blindModal = { editing:'sb', vals:{sb:state.sb,bb:state.bb,ante:state.ante}, input:String(state.sb) };
    state.ui.showBlind = true; render();
  };
  App.closeBlind = function(){ state.ui.showBlind = false; render(); };

  App.blindSelectField = function(key){
    var bm = state.blindModal;
    bm.vals[bm.editing] = parseInt(bm.input) || 0;
    bm.editing = key;
    bm.input = String(bm.vals[key] || 0);
    render();
  };
  App.blindNumpad = function(key){
    var bm = state.blindModal;
    if(key === 'DEL') bm.input = bm.input.slice(0,-1);
    else if(key === 'C') bm.input = '';
    else if(bm.input.length < 7) bm.input = (bm.input === '0') ? key : bm.input + key;
    bm.vals[bm.editing] = parseInt(bm.input) || 0;
    render();
  };
  App.blindSaveMemory = function(slot){
    var bm = state.blindModal;
    var committed = Object.assign({}, bm.vals);
    committed[bm.editing] = parseInt(bm.input) || 0;
    state.mem[slot] = committed;
    persistMemory();
    render();
  };
  App.blindLoadMemory = function(slot){
    if(!state.mem[slot]) return;
    var bm = state.blindModal;
    bm.vals = Object.assign({}, state.mem[slot]);
    bm.input = String(bm.vals[bm.editing] || 0);
    render();
  };
  App.applyBlind = function(){
    var bm = state.blindModal;
    var committed = Object.assign({}, bm.vals);
    committed[bm.editing] = parseInt(bm.input) || 0;
    state.sb = committed.sb; state.bb = committed.bb; state.ante = committed.ante;
    state.pot = state.sb + state.bb + state.ante;
    state.betHistory = [];
    state.ui.showBlind = false;
    persistSettings();
    flashPot();
  };

  App.openPlayers = function(){ state.ui.showPlayers = true; render(); };
  App.closePlayers = function(){ state.ui.showPlayers = false; render(); };
  App.selectPlayers = function(n){
    state.numPlayers = n;
    state.ui.showPlayers = false;
    persistSettings();
    render();
  };

  App.openCustomPct = function(){
    state.customPctModal = { input: state.customPct > 0 ? String(state.customPct) : '' };
    state.ui.showCustomPct = true; render();
  };
  App.closeCustomPct = function(){ state.ui.showCustomPct = false; render(); };
  App.setCustomPctPreset = function(p){ state.customPctModal.input = String(p); render(); };
  App.customPctNumpad = function(key){
    var cm = state.customPctModal;
    if(key === 'DEL') cm.input = cm.input.slice(0,-1);
    else if(key === 'C') cm.input = '';
    else if(cm.input.length < 4) cm.input = (cm.input === '0') ? key : cm.input + key;
    render();
  };
  App.applyCustomPct = function(){
    state.customPct = parseInt(state.customPctModal.input) || 0;
    state.ui.showCustomPct = false;
    render();
  };

  App.openBet = function(){ state.betModal = { amount:'', callers:'' }; state.ui.showBet = true; render(); };
  App.closeBet = function(){ state.ui.showBet = false; render(); };
  App.betNumpad = function(key){
    var b = state.betModal;
    if(key === 'DEL') b.amount = b.amount.slice(0,-1);
    else if(key === 'C') b.amount = '';
    else if(b.amount.length < 7) b.amount = (b.amount === '0') ? key : b.amount + key;
    render();
  };
  App.setCallers = function(n){ state.betModal.callers = String(n); render(); };
  App.applyBet = function(){
    var b = state.betModal;
    var bet = parseInt(b.amount) || 0, c = parseInt(b.callers) || 0;
    if(bet <= 0) return;
    var added = bet * (c + 1);
    state.pot += added;
    state.betHistory.push({ bet:bet, callers:c, total:added, isReraise:false });
    state.ui.showBet = false;
    flashPot();
  };

  App.openReraise = function(){ state.reraiseModal = { amount:'' }; state.ui.showReraise = true; render(); };
  App.closeReraise = function(){ state.ui.showReraise = false; render(); };
  App.reraiseNumpad = function(key){
    var r = state.reraiseModal;
    if(key === 'DEL') r.amount = r.amount.slice(0,-1);
    else if(key === 'C') r.amount = '';
    else if(r.amount.length < 7) r.amount = (r.amount === '0') ? key : r.amount + key;
    render();
  };
  App.applyReraise = function(){
    var r = parseInt(state.reraiseModal.amount) || 0;
    if(r <= 0) return;
    state.pot += r;
    state.betHistory.push({ bet:r, callers:0, total:r, isReraise:true });
    state.ui.showReraise = false;
    flashPot();
  };

  App.resetPot = function(){
    state.pot = state.sb + state.bb + state.ante;
    state.betHistory = [];
    flashPot();
  };

  function flashPot(){
    state.flash = true; render();
    setTimeout(function(){ state.flash = false; render(); }, 500);
  }

  // ‚îÄ‚îÄ Render helpers ‚îÄ‚îÄ
  function numpadHtml(prefix, value, color, size){
    var keys = ["7","8","9","4","5","6","1","2","3","C","0","DEL"];
    var displayVal = value === '' ? '<span style="opacity:0.25;font-size:'+(size==='large'?22:18)+'px">0</span>' : fmt(parseInt(value));
    var keysHtml = keys.map(function(k){
      var cls = 'numpad-key ' + size + (k==='C' ? ' clear' : k==='DEL' ? ' del' : '');
      return '<button class="'+cls+'" onclick="App.'+prefix+'(\''+k+'\')">'+k+'</button>';
    }).join('');
    return ''
      + '<div class="numpad-display '+size+'" style="border-color:'+color+'44;color:'+color+'">'+displayVal+'</div>'
      + '<div class="numpad-grid">'+keysHtml+'</div>';
  }

  function renderTopbar(){
    return ''
      + '<div class="topbar">'
      + '  <div class="brand"><span class="suit">‚ôÝ</span><span class="name">POT TRACKER</span></div>'
      + '  <div class="topbtns">'
      + '    <button class="topbtn gold" onclick="App.openBlind()">‚öô „Éñ„É©„Ç§„É≥„ÉâË®≠ÂÆö</button>'
      + '    <button class="topbtn red" onclick="App.resetPot()">‚ôª „É™„Çª„ÉÉ„Éà</button>'
      + '  </div>'
      + '</div>';
  }

  function renderLeft(){
    var chips = [
      {label:'SB', val:state.sb, color:'#86efac'},
      {label:'BB', val:state.bb, color:'#fbbf24'},
      {label:'Ante', val:state.ante, color:'#f9a8d4'},
    ].map(function(c){
      return '<div class="blind-chip" style="border-color:'+c.color+'30;color:'+c.color+'">'
        + '<span class="lbl">'+c.label+' </span><strong>'+fmt(c.val)+'</strong></div>';
    }).join('');

    return ''
      + '<div class="col left">'
      + '  <button class="players-btn" onclick="App.openPlayers()">üë• '+state.numPlayers+'‰∫∫„ÉÜ„Éº„Éñ„É´</button>'
      + '  <div class="pot-label">CURRENT POT</div>'
      + '  <div class="pot-value'+(state.flash?' flash':'')+'">'+fmt(state.pot)+'</div>'
      + '  <div class="blind-chips">'+chips+'</div>'
      + '  <div class="action-btns">'
      + '    <button class="action-btn bet" onclick="App.openBet()">Ôºã „Éô„ÉÉ„Éà</button>'
      + '    <button class="action-btn reraise" onclick="App.openReraise()">üî∫ „É™„É¨„Ç§„Ç∫</button>'
      + '  </div>'
      + '</div>';
  }

  function renderCenter(){
    var allPcts = PCT_LABELS.map(function(p,i){ return {pct:p, color:PCT_COLORS[i], isCustom:false}; });
    if(state.customPct > 0) allPcts.push({pct:state.customPct, color:'#e879f9', isCustom:true});
    allPcts.sort(function(a,b){ return a.pct - b.pct; });

    var rows = allPcts.map(function(p){
      var amount = Math.round(state.pot * p.pct / 100);
      var barW = Math.min(p.pct,100);
      return ''
        + '<div class="pct-row'+(p.isCustom?' custom':'')+'" style="border-color:'+p.color+'28">'
        + '  <div class="pct-left">'
        + '    <div class="pct-circle" style="background:'+p.color+'18;border-color:'+p.color+';color:'+p.color+'">'+p.pct+'%</div>'
        + '    <div class="pct-bar-wrap"><div class="pct-bar" style="width:'+barW+'%;background:'+p.color+'"></div></div>'
        + '  </div>'
        + '  <div class="pct-amount" style="color:'+p.color+'">'+fmt(amount)+'</div>'
        + '</div>';
    }).join('');

    return ''
      + '<div class="col center">'
      + '  <div class="pbs-header">'
      + '    <div class="pbs-title">POT BET SIZES</div>'
      + '    <button class="custom-pct-btn'+(state.customPct>0?' active':'')+'" onclick="App.openCustomPct()">'
      +        (state.customPct>0 ? '‚ú¶ '+state.customPct+'% Á∑®ÈõÜ' : 'Ôºã „Ç´„Çπ„Çø„ÉÝ%')
      + '    </button>'
      + '  </div>'
      + '  <div class="pct-list">'+rows+'</div>'
      + '</div>';
  }

  function renderRight(){
    var body;
    if(state.betHistory.length === 0){
      body = '<div class="hist-empty">„Éô„ÉÉ„ÉàÂ±•Ê≠¥„Å™„Åó</div>';
    } else {
      var rows = state.betHistory.slice().reverse().map(function(h){
        var label = h.isReraise ? 'üî∫ „É™„É¨„Ç§„Ç∫' : ('„Éô„ÉÉ„Éà '+fmt(h.bet)+' √ó '+(h.callers+1)+'‰∫∫');
        var borderColor = h.isReraise ? 'rgba(248,113,113,0.2)' : 'rgba(74,222,128,0.15)';
        var lblColor = h.isReraise ? '#fca5a5' : '#86efac';
        return '<div class="hist-row" style="border-color:'+borderColor+'">'
          + '<div class="lbl" style="color:'+lblColor+'">'+label+'</div>'
          + '<div class="amt">+'+fmt(h.total)+'</div></div>';
      }).join('');
      var total = state.betHistory.reduce(function(s,h){ return s+h.total; }, 0);
      body = '<div class="hist-list">'+rows+'</div>'
        + '<div class="hist-total"><span class="lbl">ÂêàË®àËøΩÂäÝ</span><span class="amt">+'+fmt(total)+'</span></div>';
    }
    return '<div class="col right"><div class="hist-title">BET HISTORY</div>'+body+'</div>';
  }

  function renderBlindModal(){
    var bm = state.blindModal;
    var fields = [
      {key:'sb', label:'SB', color:'#86efac'},
      {key:'bb', label:'BB', color:'#fbbf24'},
      {key:'ante', label:'Ante', color:'#f9a8d4'},
    ];
    var tabs = fields.map(function(f){
      var active = bm.editing === f.key;
      return '<button class="field-tab'+(active?' active':'')+'" '
        + 'style="border-color:'+(active?f.color:f.color+'28')+';background:'+(active?f.color+'18':'rgba(255,255,255,0.04)')+'" '
        + 'onclick="App.blindSelectField(\''+f.key+'\')">'
        + '<span class="flbl" style="color:'+(active?f.color:'rgba(255,255,255,0.35)')+'">'+f.label+'</span>'
        + '<span class="fval" style="color:'+(active?f.color:'rgba(255,255,255,0.55)')+'">'+fmt(bm.vals[f.key]||0)+'</span>'
        + '</button>';
    }).join('');

    var current = fields.filter(function(f){ return f.key===bm.editing; })[0];

    var memCards = [0,1].map(function(slot){
      var m = state.mem[slot];
      var valsHtml = m
        ? '<div class="mem-vals">SB <strong style="color:#86efac">'+fmt(m.sb)+'</strong>„ÄÄ'
          +'BB <strong style="color:#fbbf24">'+fmt(m.bb)+'</strong>„ÄÄ'
          +'Ante <strong style="color:#f9a8d4">'+fmt(m.ante)+'</strong></div>'
        : '<div class="mem-empty">ÔºàÊú™‰øùÂ≠òÔºâ</div>';
      var loadBtn = m
        ? '<button class="mem-btn load" onclick="App.blindLoadMemory('+slot+')">üìÇ ÂëºÂá∫</button>'
        : '<button class="mem-btn disabled">üìÇ ÂëºÂá∫</button>';
      return '<div class="mem-card">'
        + '<div class="mem-title">MEMORY '+(slot+1)+'</div>'
        + valsHtml
        + '<div class="mem-actions"><button class="mem-btn save" onclick="App.blindSaveMemory('+slot+')">üíæ ‰øùÂ≠ò</button>'+loadBtn+'</div>'
        + '</div>';
    }).join('');

    return ''
      + '<div class="modal-bg" onclick="App.closeBlind()">'
      + '  <div class="modal-box" style="width:480px" onclick="event.stopPropagation()">'
      + '    <div class="modal-title" style="color:#c9a84c">BLIND SETTINGS</div>'
      + '    <div class="field-tabs">'+tabs+'</div>'
      + '    <div style="margin-bottom:16px">'
      + '      <div style="font-size:11px;color:'+current.color+'bb;letter-spacing:2px;margin-bottom:8px">'+current.label+' „ÇíÂÖ•Âäõ</div>'
      +        numpadHtml('blindNumpad', bm.input, current.color, 'large')
      + '    </div>'
      + '    <div class="mem-grid">'+memCards+'</div>'
      + '    <div class="modal-2col">'
      + '      <button class="modal-btn cancel" onclick="App.closeBlind()">„Ç≠„É£„É≥„Çª„É´</button>'
      + '      <button class="modal-btn confirm" style="background:linear-gradient(135deg,#1a4a1a,#0e2e0e);border-color:#c9a84c;color:#c9a84c" onclick="App.applyBlind()">‚ôª ÈÅ©Áî®„Éª„É™„Çª„ÉÉ„Éà</button>'
      + '    </div>'
      + '  </div>'
      + '</div>';
  }

  function renderPlayersModal(){
    var nums = [2,3,4,5,6,7,8,9];
    var grid = nums.map(function(n){
      var active = state.numPlayers === n;
      return '<button class="players-num'+(active?' active':'')+'" onclick="App.selectPlayers('+n+')">'+n+'</button>';
    }).join('');
    return ''
      + '<div class="modal-bg" onclick="App.closePlayers()">'
      + '  <div class="modal-box" style="width:340px" onclick="event.stopPropagation()">'
      + '    <div class="modal-title" style="color:#93c5fd">„Éó„É¨„Ç§„É§„Éº‰∫∫Êï∞</div>'
      + '    <div class="players-grid">'+grid+'</div>'
      + '    <button class="modal-btn cancel" style="width:100%;margin-top:16px" onclick="App.closePlayers()">Èñâ„Åò„Çã</button>'
      + '  </div>'
      + '</div>';
  }

  function renderCustomPctModal(){
    var cm = state.customPctModal;
    var presets = PRESET_PCTS.map(function(p){
      var active = cm.input === String(p);
      return '<button class="preset-btn'+(active?' active':'')+'" onclick="App.setCustomPctPreset('+p+')">'+p+'%</button>';
    }).join('');
    var disabled = !cm.input;
    return ''
      + '<div class="modal-bg" onclick="App.closeCustomPct()">'
      + '  <div class="modal-box" style="width:320px" onclick="event.stopPropagation()">'
      + '    <div class="modal-title" style="color:#e879f9">„Ç´„Çπ„Çø„ÉÝ %</div>'
      + '    <div class="preset-grid">'+presets+'</div>'
      + '    <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:8px;text-align:center">„Åæ„Åü„ÅØÁõ¥Êé•ÂÖ•Âäõ</div>'
      +      numpadHtml('customPctNumpad', cm.input, '#e879f9', 'small')
      + '    <div class="modal-2col" style="margin-top:14px">'
      + '      <button class="modal-btn cancel" onclick="App.closeCustomPct()">„Ç≠„É£„É≥„Çª„É´</button>'
      + '      <button class="modal-btn confirm'+(disabled?' disabled':'')+'" '
      +          'style="background:'+(disabled?'rgba(232,121,249,0.06)':'linear-gradient(135deg,#4a1a5a,#2e0e3c)')+';border-color:#e879f9;color:'+(disabled?'rgba(232,121,249,0.35)':'#e879f9')+'" '
      +          (disabled ? '' : 'onclick="App.applyCustomPct()"')
      +        '>„Çª„ÉÉ„Éà ‚úì</button>'
      + '    </div>'
      + '  </div>'
      + '</div>';
  }

  function renderBetModal(){
    var b = state.betModal;
    var callerBtns = [0,1,2,3,4,5,6,7].map(function(n){
      var active = b.callers === String(n);
      return '<button class="caller-btn'+(active?' active':'')+'" onclick="App.setCallers('+n+')">'+n+'</button>';
    }).join('');
    var preview = '';
    if(b.amount && b.callers !== ''){
      var amt = (parseInt(b.amount)||0) * ((parseInt(b.callers)||0)+1);
      preview = '<div class="preview-box" style="background:rgba(74,222,128,0.07);border-color:rgba(74,222,128,0.2)">'
        + '<div class="preview-label">„Éù„ÉÉ„ÉàËøΩÂäÝÈ°ç</div>'
        + '<div class="preview-amt" style="color:#4ade80">'+fmt(amt)+'</div></div>';
    }
    var canApply = b.amount && b.callers !== '';
    return ''
      + '<div class="modal-bg" onclick="App.closeBet()">'
      + '  <div class="modal-box" onclick="event.stopPropagation()">'
      + '    <div class="bet-modal-grid">'
      + '      <div>'
      + '        <div class="modal-title" style="color:#4ade80;margin-bottom:12px">„Éô„ÉÉ„ÉàÈ°ç</div>'
      +          numpadHtml('betNumpad', b.amount, '#4ade80', 'large')
      + '      </div>'
      + '      <div style="display:flex;flex-direction:column;justify-content:space-between">'
      + '        <div>'
      + '          <div style="font-size:12px;letter-spacing:2px;color:rgba(255,255,255,0.45);margin-bottom:10px">„Ç≥„Éº„É´‰∫∫Êï∞Ôºà„Éô„ÉÉ„Çø„ÉºÂê´„Åæ„Å™„ÅÑÔºâ</div>'
      + '          <div class="callers-grid">'+callerBtns+'</div>'
      +            preview
      + '        </div>'
      + '        <div class="modal-2col" style="margin-top:12px">'
      + '          <button class="modal-btn cancel" onclick="App.closeBet()">„Ç≠„É£„É≥„Çª„É´</button>'
      + '          <button class="modal-btn confirm'+(canApply?'':' disabled')+'" '
      +              'style="background:'+(canApply?'linear-gradient(135deg,#166534,#14532d)':'rgba(74,222,128,0.08)')+';border-color:#4ade80;color:'+(canApply?'#4ade80':'rgba(74,222,128,0.4)')+'" '
      +              (canApply ? 'onclick="App.applyBet()"' : '')
      +            '>ËøΩÂäÝ ‚úì</button>'
      + '        </div>'
      + '      </div>'
      + '    </div>'
      + '  </div>'
      + '</div>';
  }

  function renderReraiseModal(){
    var r = state.reraiseModal;
    var preview = '';
    if(r.amount){
      preview = '<div class="preview-box" style="background:rgba(248,113,113,0.07);border-color:rgba(248,113,113,0.2)">'
        + '<div class="preview-label">„Éù„ÉÉ„ÉàËøΩÂäÝÈ°ç</div>'
        + '<div class="preview-amt" style="color:#f87171">'+fmt(parseInt(r.amount)||0)+'</div></div>';
    }
    var canApply = !!r.amount;
    return ''
      + '<div class="modal-bg" onclick="App.closeReraise()">'
      + '  <div class="modal-box" style="width:300px" onclick="event.stopPropagation()">'
      + '    <div class="modal-title" style="color:#f87171">üî∫ „É™„É¨„Ç§„Ç∫È°ç</div>'
      +      numpadHtml('reraiseNumpad', r.amount, '#f87171', 'large')
      +      preview
      + '    <div class="modal-2col" style="margin-top:14px">'
      + '      <button class="modal-btn cancel" onclick="App.closeReraise()">„Ç≠„É£„É≥„Çª„É´</button>'
      + '      <button class="modal-btn confirm'+(canApply?'':' disabled')+'" '
      +          'style="background:'+(canApply?'linear-gradient(135deg,#7f1d1d,#450a0a)':'rgba(248,113,113,0.08)')+';border-color:#f87171;color:'+(canApply?'#f87171':'rgba(248,113,113,0.4)')+'" '
      +          (canApply ? 'onclick="App.applyReraise()"' : '')
      +        '>ËøΩÂäÝ ‚úì</button>'
      + '    </div>'
      + '  </div>'
      + '</div>';
  }

  function render(){
    var html = ''
      + '<div class="page" style="display:flex;flex-direction:column;width:100%;height:100%">'
      +   renderTopbar()
      +   '<div class="maingrid">' + renderLeft() + renderCenter() + renderRight() + '</div>'
      + '</div>';

    if(state.ui.showBlind) html += renderBlindModal();
    if(state.ui.showPlayers) html += renderPlayersModal();
    if(state.ui.showCustomPct) html += renderCustomPctModal();
    if(state.ui.showBet) html += renderBetModal();
    if(state.ui.showReraise) html += renderReraiseModal();

    document.getElementById('app').innerHTML = html;
  }

  window.App = App;

  // ‚îÄ‚îÄ init ‚îÄ‚îÄ
  loadPersisted();
  render();
})();
</script>
</body>
